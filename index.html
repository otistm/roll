<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ROLL</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; background:#fff; touch-action:none;
    -webkit-user-select:none; user-select:none;
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; color:#111; }
  #scene { position:fixed; inset:0; display:block; }

  #hud { position:fixed; top:calc(env(safe-area-inset-top,0px) + 22px); left:26px; right:26px;
    display:flex; justify-content:space-between; align-items:center; pointer-events:none; }
  #hudLeft { display:flex; align-items:center; gap:10px; flex-wrap:wrap; max-width:52%; }
  #score { font-size:11px; font-weight:600; letter-spacing:0.42em; }
  #timer { font-size:11px; font-weight:600; letter-spacing:0.28em; color:#555; }
  #hudBadges { display:flex; gap:5px; flex-wrap:wrap; }
  .shield { width:15px; height:18px; background:#111; color:#fff;
    clip-path:polygon(0 0, 100% 0, 100% 62%, 50% 100%, 0 62%);
    display:flex; align-items:center; justify-content:center;
    font-size:6.5px; font-weight:700; padding-bottom:3px;
    animation:shieldIn 0.35s cubic-bezier(.3,1.8,.4,1); }
  @keyframes shieldIn { 0% { transform:scale(0); } 100% { transform:scale(1); } }
  @media (prefers-reduced-motion: reduce) { .shield { animation:none; } }
  #hearts { display:flex; gap:8px; }
  .heart { width:10px; height:10px; border-radius:50%; background:#111; border:1.5px solid #111; }
  .heart.lost { background:transparent; }

  /* LAVA PITS: keep HUD readable over ink floor */
  body.lava #score, body.lava #timer, body.lava #coins {
    text-shadow:0 0 8px #fff, 0 1px 0 #fff, 0 -1px 0 #fff, 1px 0 0 #fff, -1px 0 0 #fff;
  }
  body.lava .heart { box-shadow:0 0 0 2px #fff; }
  body.lava .heart.lost { box-shadow:0 0 0 2px rgba(255,255,255,0.85); background:rgba(255,255,255,0.35); }

  /* Coin counter — Mario-style spinning coin in the header */
  #coins { display:flex; align-items:center; gap:8px;
    font-size:11px; font-weight:600; letter-spacing:0.3em; }
  .coinIcon { width:14px; height:14px; border-radius:50%;
    background:#f2b705; border:1.5px solid #111;
    animation:coinSpin 0.9s linear infinite; }
  @keyframes coinSpin {
    0%   { transform:rotateY(0deg); }
    100% { transform:rotateY(360deg); }
  }
  #coins.bump { animation:counterBump 0.28s cubic-bezier(.3,1.6,.4,1); }
  @keyframes counterBump {
    0% { transform:scale(1); } 40% { transform:scale(1.35); } 100% { transform:scale(1); }
  }

  /* Coin flying from the field into the counter */
  .coinFly { position:fixed; width:16px; height:16px; border-radius:50%;
    background:#f2b705; border:1.5px solid #111; z-index:8; pointer-events:none;
    animation:coinSpin 0.45s linear infinite;
    transition:left 0.55s cubic-bezier(.4,-0.2,.6,1), top 0.55s cubic-bezier(.3,.8,.4,1); }

  @media (prefers-reduced-motion: reduce) {
    .coinIcon, .coinFly { animation:none; }
    .coinFly { transition-duration:0.2s; }
  }

  #stick {
    position:fixed; left:30px; bottom:calc(env(safe-area-inset-bottom,0px) + 34px);
    width:132px; height:132px; border-radius:50%;
    border:1.5px solid #111; touch-action:none; z-index:5;
  }

  /* Combo heat on the coin counter */
  #coins { transition:font-size 0.15s ease; }
  #coins.hot, #coins.hot #coinCount { color:#e8262a; }
  #coins.hot .coinIcon { border-color:#e8262a; }

  /* INK STORM: pulsing screen border + label */
  #storm { position:fixed; inset:0; pointer-events:none; z-index:4; opacity:0;
    box-shadow:inset 0 0 0 4px #111; }
  #storm span { position:absolute; top:calc(env(safe-area-inset-top,0px) + 54px);
    left:50%; transform:translateX(-50%);
    font-size:10px; font-weight:600; letter-spacing:0.5em; text-indent:0.5em; color:#111; }
  #storm.on { animation:stormPulse 0.6s ease-in-out infinite; }
  @keyframes stormPulse { 0%,100% { opacity:0.15; } 50% { opacity:0.75; } }
  @media (prefers-reduced-motion: reduce) { #storm.on { animation:none; opacity:0.4; } }

  /* THE INKWELL boss HUD */
  #bossHud { position:fixed; top:calc(env(safe-area-inset-top,0px) + 52px);
    left:26px; right:26px; z-index:6; pointer-events:none; display:none; }
  #bossHud.on { display:block; }
  #bossHudLabels { display:flex; justify-content:space-between; align-items:baseline;
    font-size:10px; font-weight:600; letter-spacing:0.34em; text-indent:0.34em;
    color:#111; margin-bottom:6px; }
  #bossPhase { letter-spacing:0.28em; text-indent:0; color:#555; }
  #bossHpTrack { position:relative; height:10px; background:rgba(17,17,17,0.12);
    border:1.5px solid #111; }
  #bossHpFill { position:absolute; inset:0 auto 0 0; width:100%; background:#111;
    transition:width 0.12s linear; }
  .bossTick { position:absolute; top:0; bottom:0; width:2px; background:#fff; }
  #bossBanner { position:fixed; top:36%; left:0; right:0; text-align:center; z-index:7;
    pointer-events:none; font-size:22px; font-weight:700; letter-spacing:0.42em;
    text-indent:0.42em; color:#111; opacity:0; transition:opacity 0.25s; }

  /* Hub portal wait — countdown label */
  #hubPortalHud { position:fixed; top:calc(env(safe-area-inset-top,0px) + 52px);
    left:0; right:0; z-index:6; pointer-events:none; display:none; text-align:center;
    font-size:10px; font-weight:600; letter-spacing:0.34em; text-indent:0.34em; color:#111; }
  #hubPortalHud.on { display:block; }
  #knob {
    position:absolute; left:50%; top:50%;
    width:52px; height:52px; border-radius:50%; background:#111;
    transform:translate(-50%,-50%);
    transition:transform 0.18s cubic-bezier(.2,.9,.3,1.2); will-change:transform;
  }
  #stick.live #knob { transition:none; }

  /* Badge toast: slides in under the HUD when earned */
  #toast {
    position:fixed; top:calc(env(safe-area-inset-top,0px) + 58px); left:50%;
    transform:translate(-50%,-12px); opacity:0; z-index:9; pointer-events:none;
    background:#fff; border:2px solid #111; border-radius:999px;
    padding:14px 28px; font-size:15px; font-weight:600;
    letter-spacing:0.28em; text-indent:0.28em; color:#111; white-space:nowrap;
    transition:opacity 0.25s ease, transform 0.25s cubic-bezier(.2,1.4,.4,1);
  }
  #toast.show { opacity:1; transform:translate(-50%,0); }

  /* Badge row on the game-over screen */
  #badgeLabel { font-size:10px; font-weight:600; letter-spacing:0.34em; text-indent:0.34em; color:#555; }
  #badgeRow { display:flex; flex-wrap:wrap; gap:9px; justify-content:center; max-width:300px;
    pointer-events:auto; }
  .badge { width:32px; height:32px; border-radius:50%; border:1.5px solid #bbb;
    display:flex; align-items:center; justify-content:center;
    font-size:9px; font-weight:700; letter-spacing:0.05em; color:#bbb;
    cursor:pointer; pointer-events:auto; }
  .badge.got { border-color:#111; background:#111; color:#fff; }
  .badge.sel { box-shadow:0 0 0 2px #e8262a; }

  /* Small badge criteria card on the resolution screen */
  #badgeInfo {
    position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
    z-index:14; width:min(280px,86vw); padding:22px 20px 18px;
    background:#fff; border:1.5px solid #111; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    pointer-events:auto; box-shadow:0 12px 40px rgba(0,0,0,0.12);
  }
  #badgeInfo.hidden { display:none; }
  #badgeInfoGlyph { width:40px; height:40px; border-radius:50%; border:1.5px solid #111;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; letter-spacing:0.05em; margin-bottom:2px; }
  #badgeInfoGlyph.got { background:#111; color:#fff; }
  #badgeInfoGlyph:not(.got) { color:#bbb; border-color:#bbb; }
  #badgeInfoName { font-size:12px; font-weight:700; letter-spacing:0.34em; text-indent:0.34em; }
  #badgeInfoHow { font-size:11px; letter-spacing:0.12em; line-height:1.7; color:#555;
    max-width:240px; }
  #badgeInfoStatus { font-size:9px; font-weight:600; letter-spacing:0.34em; text-indent:0.34em; color:#999; }
  #badgeInfoClose { font-size:10px; font-weight:600; letter-spacing:0.34em; margin-left:0.34em;
    padding:10px 18px; border:1.5px solid #111; border-radius:999px; cursor:pointer; margin-top:4px; }

  #stick.padHide { display:none; }

  /* Raygun unlock overlay (shown when the giant falls) */
  #raygunOverlay { background:rgba(255,255,255,0.96); z-index:20; gap:22px; }
  #raygunUnlockIcon { width:56px; height:56px; border-radius:6px; background:#50ffd2;
    border:2px solid #111; box-shadow:inset -12px 0 0 #18a0a8;
    animation:shieldIn 0.45s cubic-bezier(.3,1.8,.4,1); }
  #raygunLabel { font-size:13px; font-weight:600; letter-spacing:0.42em;
    text-indent:0.42em; }

  /* Raygun HUD pip + flying pickup */
  #raySlot { display:none; align-items:center; }
  #raySlot.got { display:flex; animation:shieldIn 0.35s cubic-bezier(.3,1.8,.4,1); }
  .rayIcon { width:14px; height:14px; border-radius:2px; background:#50ffd2;
    border:1.5px solid #111; box-shadow:inset -3px 0 0 #18a0a8; }
  .rayFly { position:fixed; z-index:30; pointer-events:none;
    width:22px; height:22px; border-radius:3px; background:#50ffd2;
    border:1.5px solid #111; box-shadow:inset -5px 0 0 #18a0a8;
    transition:left 0.6s cubic-bezier(.4,-0.2,.6,1), top 0.6s cubic-bezier(.3,.8,.4,1),
               width 0.6s ease, height 0.6s ease; }


  #inkMeter { position:fixed; width:46px; height:9px; border:1.5px solid #111;
    border-radius:4px; background:#fff; z-index:6; pointer-events:none;
    display:none; transform:translate(-50%,-50%); }
  #inkFill { height:100%; width:0%; background:#111; border-radius:2px;
    transition:width 0.12s ease; }

  /* THE OBSIDIAN's room inverts the UI so it reads on the void */
  body.void #score, body.void #timer, body.void #coinCount { color:#dfe9ff; }
  body.void #timer { color:#9fb1d8; }
  body.void .heart { background:#dfe9ff; border-color:#dfe9ff; }
  body.void .heart.lost { background:transparent; }
  body.void .shield { background:#dfe9ff; color:#07080f; }
  body.void #toast { background:rgba(10,12,22,0.92); color:#dfe9ff; border-color:#dfe9ff; }
  body.void .coinIcon { border-color:#dfe9ff; }
  body.void #inkMeter { border-color:#dfe9ff; background:rgba(255,255,255,0.12); }
  body.void #inkFill { background:#dfe9ff; }
  body.void #raySlot .rayIcon { border-color:#dfe9ff; }

  .overlay {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.92); text-align:center; gap:14px;
    padding:calc(env(safe-area-inset-top,0px) + 18px) 20px calc(env(safe-area-inset-bottom,0px) + 18px);
    overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y;
  }
  .overlay.hidden { display:none; }
  #startOverlay { background:#fff; }
  .overlay h1 { font-size:34px; font-weight:700; letter-spacing:0.5em; margin-left:0.5em; }
  .overlay p  { font-size:11px; letter-spacing:0.16em; line-height:1.85; color:#555; }
  .overlay .cta { font-size:11px; font-weight:600; letter-spacing:0.42em; margin-left:0.42em;
    padding:14px 26px; border:1.5px solid #111; border-radius:999px; cursor:pointer; }
  .overlay .cta.padFocus,
  #badgeInfoClose.padFocus,
  .badge.padFocus {
    box-shadow:0 0 0 2px #e8262a;
  }
  #finalScore { font-size:13px; font-weight:600; letter-spacing:0.3em; color:#111; }
  #finalTime { font-size:10px; font-weight:600; letter-spacing:0.34em; color:#555; }
  #finalCause { font-size:11px; font-weight:600; letter-spacing:0.28em; text-indent:0.28em; color:#e8262a; }
  #finalCause.hidden, #finalHigh.hidden { display:none; }
  #finalHigh { font-size:12px; font-weight:700; letter-spacing:0.34em; text-indent:0.34em; color:#111; }

  /* Death resolution screen — opaque black, light type */
  #overOverlay {
    background:#000;
    color:#fff;
  }
  #overOverlay h1,
  #overOverlay #finalScore,
  #overOverlay #finalHigh { color:#fff; }
  #overOverlay #finalCause { color:#e8262a; }
  #overOverlay #finalTime,
  #overOverlay #badgeLabel,
  #overOverlay .board h2,
  #overOverlay .board .empty,
  #overOverlay .board .status,
  #overOverlay .board .rank { color:rgba(255,255,255,0.72); }
  #overOverlay .board li { color:#fff; border-bottom-color:rgba(255,255,255,0.22); }
  #overOverlay .board li.padFocus {
    box-shadow:inset 0 0 0 2px #fff;
    background:rgba(255,255,255,0.12);
  }
  #overOverlay .cta { border-color:#fff; color:#fff; }
  #overOverlay .cta.padFocus { box-shadow:0 0 0 2px #fff; }
  #overOverlay .badge { border-color:rgba(255,255,255,0.4); color:rgba(255,255,255,0.4); }
  #overOverlay .badge.got { border-color:#fff; background:#fff; color:#111; }
  #overOverlay .badge.sel { box-shadow:0 0 0 2px #fff; }

  #nameField {
    width:min(260px,78vw); padding:12px 16px; border:1.5px solid #111; border-radius:0;
    background:transparent; color:#111; text-align:center;
    font:inherit; font-size:12px; font-weight:600; letter-spacing:0.32em;
    text-transform:uppercase; outline:none; -webkit-user-select:text; user-select:text;
  }
  #nameField::placeholder { color:#aaa; letter-spacing:0.28em; }
  #nameField:focus { border-color:#e8262a; }
  #nameHint { font-size:10px; letter-spacing:0.28em; color:#e8262a; min-height:1.2em; }

  .board {
    width:min(280px,82vw); margin-top:4px;
    font-size:11px; font-weight:600; letter-spacing:0.22em; text-align:left;
  }
  .board h2 {
    font-size:10px; font-weight:600; letter-spacing:0.42em; text-align:center;
    margin:0 0 10px; color:#555;
  }
  .board ol { list-style:none; margin:0; padding:0; }
  .board li {
    display:grid; grid-template-columns:28px 1fr auto; gap:10px;
    padding:5px 0; border-bottom:1px solid #eee; color:#111;
    cursor:pointer; pointer-events:auto;
  }
  .board li:last-child { border-bottom:none; }
  .board li.padFocus {
    box-shadow: inset 0 0 0 2px #e8262a;
    background:rgba(232,38,42,0.06);
  }
  #profileClose.padFocus {
    box-shadow:0 0 0 2px #e8262a;
  }
  .board li:active { opacity:0.55; }
  .board .rank { color:#999; }
  .board .empty, .board .status {
    text-align:center; color:#999; letter-spacing:0.2em; padding:8px 0;
  }
  .overlay .cta.disabled { opacity:0.35; pointer-events:none; }

  #profileOverlay { z-index:12; gap:16px; }
  #profileScore { font-size:12px; font-weight:600; letter-spacing:0.28em; }
  #profileBadgeLabel { font-size:10px; font-weight:600; letter-spacing:0.34em; text-indent:0.34em; color:#555; }
  #profileBadgeRow { display:flex; flex-wrap:wrap; gap:9px; justify-content:center; max-width:300px; }
  #profileBadgeRow .badge { width:36px; height:36px; }
  #profileHint { font-size:10px; letter-spacing:0.2em; color:#999; }

  @media (prefers-reduced-motion: reduce) { #knob { transition:none; } }
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div id="hud">
  <div id="hudLeft">
    <div id="score">ROLL &middot; 000</div>
    <div id="timer">0:00</div>
    <div id="hudBadges"></div>
  </div>
  <div id="coins"><div class="coinIcon"></div><span id="coinCount">&times; 00</span></div>
  <div id="raySlot"><div class="rayIcon"></div></div>
  <div id="hearts"><div class="heart"></div><div class="heart"></div><div class="heart"></div></div>
</div>

<div id="stick"><div id="knob"></div></div>
<div id="storm"><span>INK STORM</span></div>
<div id="bossHud">
  <div id="bossHudLabels"><span>THE INKWELL</span><span id="bossPhase">I · SEEP</span></div>
  <div id="bossHpTrack">
    <div id="bossHpFill"></div>
    <div class="bossTick" style="left:33.333%"></div>
    <div class="bossTick" style="left:66.667%"></div>
  </div>
</div>
<div id="hubPortalHud">PORTAL OPENS IN 30</div>
<div id="bossBanner"></div>
<div id="inkMeter"><div id="inkFill"></div></div>
<div id="toast"></div>

<div id="raygunOverlay" class="overlay hidden">
  <div id="raygunUnlockIcon"></div>
  <div id="raygunLabel">RAYGUN UNLOCKED</div>
</div>

<div id="startOverlay" class="overlay">
  <h1>ROLL</h1>
  <input id="nameField" type="text" maxlength="12" autocomplete="off" autocorrect="off"
    autocapitalize="characters" spellcheck="false" placeholder="YOUR NAME" enterkeyhint="done">
  <div id="nameHint"></div>
  <div id="startCta" class="cta">TAP TO START</div>
  <div class="board" id="startBoard">
    <h2>TOP SCORES</h2>
    <div class="status">LOADING…</div>
  </div>
</div>

<div id="overOverlay" class="overlay hidden">
  <h1>ROLL</h1>
  <div id="finalCause" class="hidden"></div>
  <div id="finalHigh" class="hidden"></div>
  <div id="finalScore">SCORE 000 &middot; BEST 000</div>
  <div id="finalTime">TIME TIL DEATH &middot; 0:00</div>
  <div id="badgeLabel">BADGES 0/15</div>
  <div id="badgeRow"></div>
  <div class="board" id="overBoard">
    <h2>TOP SCORES</h2>
    <div class="status">LOADING…</div>
  </div>
  <div id="retryCta" class="cta">TAP TO RETRY</div>
</div>

<div id="badgeInfo" class="hidden">
  <div id="badgeInfoGlyph"></div>
  <div id="badgeInfoName"></div>
  <div id="badgeInfoHow"></div>
  <div id="badgeInfoStatus"></div>
  <div id="badgeInfoClose">CLOSE</div>
</div>

<div id="profileOverlay" class="overlay hidden">
  <h1 id="profileName">PLAYER</h1>
  <div id="profileScore">SCORE 000</div>
  <div id="profileBadgeLabel">BADGES 0/15</div>
  <div id="profileBadgeRow"></div>
  <div id="profileHint">TAP OUTSIDE TO CLOSE</div>
  <div id="profileClose" class="cta">CLOSE</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  'use strict';

  /* ============================ Constants ============================ */
  /* Physics + design values verified headless (sim2.js):
     hop maxRise 2.25, beam-clear 0.63s, bullet-dodge 0.60s, mound-top safe */
  var G=30, RADIUS=1, ACCEL=54, FRICTION=3.6, MAX_SPEED=15, REST=0.35; /* MAX_SPEED == ACCEL/FRICTION: no air/ground mismatch */
  var BLUE=0x18a0e8, BOOST_MULT=1.6, BOOST_TIME=4; /* speed pad: 1.6x for 4s, keeps clamp==terminal */
  var RAY=0x50ffd2, RAYGUN_TIME=10; /* unlocked after defeating the giant: auto-blasts projectiles */
  var ARENA=26, BOSS_ARENA=34, HOP_VY=16, BEAM_TOP=0.95, BULLET_R=0.45, MAX_BULLETS=280;
  var INK=0x111111, RED=0xe8262a, GOLD=0xf2b705, WARN=0xbbbbbb;
  var SHADE=0x9a9a9a, SDX=0.848, SDZ=-0.53; /* drop-shadow color + direction (opposite key light) */
  var FIELD_OFF=false;      /* true while the major boss owns the arena: terrain + pillars vanish */
  var obsMeshes=[];         /* THE OBSIDIAN boss room meshes (declared early) */
  var OBS_R=22;             /* boss room radius */
  var OBS_FLOAT=14, OBS_GROUND=3.2; /* float + slam heights (needed at mesh build time) */
  var level='arena';        /* 'arena' hub, 'corridor' climb, 'spiral' Nautilus, 'obsidian' boss, 'lava' pits */
  var lavaMeshes=[];        /* LAVA PITS meshes */
  var PIPE_K=0.032, PIPE_HW=10, CORR_XMAX=12.5, CORR_START=6, CORR_END=-130;
  var DIAMOND=0xbfeef8;
  /* THE NAUTILUS: conical spiral path to the ceiling */
  var SP_R0=6, SP_TURNS=1.75, SP_THMAX=SP_TURNS*Math.PI*2;
  var SP_R1=16.5, SP_RK=(SP_R1-SP_R0)/SP_THMAX, SP_W=5.2, SP_H=24, SP_BOUND=20;
  function sp_r(th){ return SP_R0+SP_RK*th; }
  var SP_TOPTH=SP_THMAX, SP_TOPA=SP_TOPTH%(Math.PI*2);
  var SP_TOPX=Math.cos(SP_TOPA)*sp_r(SP_TOPTH), SP_TOPZ=Math.sin(SP_TOPA)*sp_r(SP_TOPTH), SP_TOPR=4.2;
  function spiralHeights(x,z){
    var a=Math.atan2(z,x); if(a<0)a+=Math.PI*2;
    var r=Math.hypot(x,z), out=[];
    for(var k=0;k<3;k++){
      var th=a+k*Math.PI*2;
      if(th>SP_THMAX+0.001)break;
      if(Math.abs(r-sp_r(th))<=SP_W/2)out.push(SP_H*th/SP_THMAX);
    }
    var dx=x-SP_TOPX, dz=z-SP_TOPZ;

  function tone(freq,dur,type,vol,sweepTo){
    if(!AC)return;
    var o=AC.createOscillator(),g=AC.createGain();
    o.type=type||'square';
    o.frequency.setValueAtTime(freq,AC.currentTime);
    if(sweepTo)o.frequency.exponentialRampToValueAtTime(sweepTo,AC.currentTime+dur);
    g.gain.setValueAtTime(vol||0.07,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime+dur+0.02);
  }
  function coinBlip(){ tone(523*Math.pow(2,Math.min(combo,24)/12),0.09,'square',0.055); }

  function boomSfx(){ tone(90,0.28,'sine',0.2,36); tone(45,0.3,'triangle',0.12); }

  function noiseBuf(dur){
    var b=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
    var d=b.getChannelData(0);
    for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    return b;
  }
  function blastSfx(power){
    if(!AC)return;
    var t=AC.currentTime;
    var src=AC.createBufferSource(); src.buffer=noiseBuf(1.1);
    var bp=AC.createBiquadFilter(); bp.type='lowpass';
    bp.frequency.setValueAtTime(9000,t);
    bp.frequency.exponentialRampToValueAtTime(300,t+0.9);
    var ng=AC.createGain();
    ng.gain.setValueAtTime(0.22*power,t);
    ng.gain.exponentialRampToValueAtTime(0.0001,t+1.0);
    src.connect(bp).connect(ng).connect(AC.destination); src.start(t);
    var sub=AC.createOscillator(); sub.type='sine';
    sub.frequency.setValueAtTime(170,t);
    sub.frequency.exponentialRampToValueAtTime(38,t+0.5);
    var sg=AC.createGain();
    sg.gain.setValueAtTime(0.3*power,t);
    sg.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
    sub.connect(sg).connect(AC.destination); sub.start(t); sub.stop(t+0.6);
    for(var i=0;i<4;i++){
      var o=AC.createOscillator(); o.type='sine';
      var f=1500+Math.random()*3000;
      o.frequency.setValueAtTime(f,t);
      o.frequency.exponentialRampToValueAtTime(f*1.6,t+0.4);
      var og=AC.createGain();
      og.gain.setValueAtTime(0.0001,t+i*0.02);
      og.gain.exponentialRampToValueAtTime(0.04*power,t+i*0.02+0.03);
      og.gain.exponentialRampToValueAtTime(0.0001,t+0.5+i*0.05);
      o.connect(og).connect(AC.destination); o.start(t); o.stop(t+0.8);
    }
  }
  function chargeSfx(){
    if(!AC)return;
    var t=AC.currentTime;
    var o=AC.createOscillator(),g=AC.createGain(),lp=AC.createBiquadFilter();
    o.type='sawtooth';
    o.frequency.setValueAtTime(110,t);
    o.frequency.exponentialRampToValueAtTime(760,t+0.85);
    lp.type='lowpass';
    lp.frequency.setValueAtTime(500,t);
    lp.frequency.exponentialRampToValueAtTime(3200,t+0.85);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.045,t+0.25);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.88);
    o.connect(lp).connect(g).connect(AC.destination);
    o.start(t); o.stop(t+0.9);
  }

  function persistBadges(){

    ref.get().then(function(doc){
      var payload;
      var badgeSet={};
      for(var bi=0;bi<list.length;bi++) badgeSet[list[bi]]=true;
      if(doc.exists){
        var d=doc.data();
        var prevBadges=Array.isArray(d.badges)?d.badges:[];
        for(var pi=0;pi<prevBadges.length;pi++) badgeSet[prevBadges[pi]]=true;
        var merged=[];
        for(var mi=0;mi<BADGES.length;mi++) if(badgeSet[BADGES[mi].id]) merged.push(BADGES[mi].id);
        payload={
          name:d.name||playerName||'PLAYER',
          score:Math.max(0, Math.min(999999, d.score|0)),
          time:Math.max(0, Math.min(999999, d.time!=null?d.time|0:bestTime|0)),
          badges:merged.slice(0,32),
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        };

        };

  function loadLeaderboard(){
    if(!db){ setBoardStatus('NO SCORES YET'); return Promise.resolve(); }
    return db.collection('scores').orderBy('score','desc').limit(10).get()
      .then(function(snap){
        boardCache=[];
        snap.forEach(function(doc){
          var d=doc.data()||{};
          var sc=Math.floor(Number(d.score)||0)|0;
          var tm=d.time!=null?Math.floor(Number(d.time)||0)|0:0;
          if(sc<1) return; /* skip ghost profiles with no real score */
          boardCache.push({
            uid:doc.id,
            name:d.name||'???',
            score:sc,
            time:tm,
            badges:Array.isArray(d.badges)?d.badges.slice():[]
          });
        });
        refreshBoards();
      })
      .catch(function(err){
        console.warn('leaderboard', err);
        /* Fallback: unordered read if score index/type query fails */
        return db.collection('scores').limit(25).get()
          .then(function(snap){
            boardCache=[];
            snap.forEach(function(doc){
              var d=doc.data()||{};
              var sc=Math.floor(Number(d.score)||0)|0;
              var tm=d.time!=null?Math.floor(Number(d.time)||0)|0:0;
              if(sc<1) return;
              boardCache.push({
                uid:doc.id,
                name:d.name||'???',
                score:sc,
                time:tm,
                badges:Array.isArray(d.badges)?d.badges.slice():[]
              });
            });
            boardCache.sort(function(a,b){ return b.score-a.score||b.time-a.time; });
            boardCache=boardCache.slice(0,10);
            refreshBoards();
          })
          .catch(function(err2){

  function flushPendingSubmit(){
    if(!pendingSubmit||!fbReady) return;
    var p=pendingSubmit; pendingSubmit=null;
    submitScore(p.s, p.t);
  }
  function submitScore(s, t){
    var scoreVal=Math.max(0, Math.min(999999, Math.floor(Number(s)||0)));
    var timeVal=Math.max(0, Math.min(999999, Math.floor(Number(t!=null?t:elapsed)||0)));
    if(!db||!fbUser||!fbReady){
      pendingSubmit={s:scoreVal, t:timeVal};
      console.warn('submit queued — firebase not ready');
      return Promise.resolve();
    }
    var v=validateName(playerName);
    if(!v.ok){
      console.warn('submit skipped — invalid name');
      return Promise.resolve();
    }
    var badges=earnedBadgeList().slice(0,32);
    var ref=db.collection('scores').doc(fbUser.uid);
    /* read-merge-write: score/badges only grow; time follows the best score */
    return ref.get().then(function(doc){
      var prev=doc.exists?doc.data():null;
      var prevScore=prev?prev.score|0:0;
      var prevTime=prev&&prev.time!=null?prev.time|0:0;
      var prevBadges=prev&&Array.isArray(prev.badges)?prev.badges:[];
      var writeScore=Math.max(scoreVal, prevScore)|0;
      var writeTime=prevTime|0;
      if(scoreVal>prevScore) writeTime=timeVal|0;
      else if(scoreVal===prevScore) writeTime=Math.max(prevTime, timeVal)|0;
      var merged={};
      for(var i=0;i<prevBadges.length;i++) merged[prevBadges[i]]=true;
      for(var j=0;j<badges.length;j++) merged[badges[j]]=true;
      var outBadges=[];
      for(var k=0;k<BADGES.length;k++) if(merged[BADGES[k].id]) outBadges.push(BADGES[k].id);
      var payload={
        name:v.name,
        score:writeScore,
        time:writeTime,
        badges:outBadges,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      };
      return ref.set(payload).then(function(){
        remoteBest=writeScore;
        best=Math.max(best|0, writeScore);
        bestTime=writeTime;
      });
    })
      .then(function(){ return loadLeaderboard(); })
      .catch(function(err){
        console.warn('submit', err);
        /* keep pending so a later retry / next death can still land */
        pendingSubmit={s:scoreVal, t:timeVal};
        return loadLeaderboard();
      });
  }
  function initFirebase(){
    var cfg=window.FIREBASE_CONFIG;
    if(!cfg||!cfg.apiKey||cfg.apiKey==='YOUR_API_KEY'){
      setBoardStatus('NO SCORES YET');
      return;
    }
    try{
      firebase.initializeApp(cfg);
      db=firebase.firestore();
      firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL)
        .catch(function(err){ console.warn('persistence', err); })
        .then(function(){
          return new Promise(function(resolve, reject){
            var unsub=firebase.auth().onAuthStateChanged(function(user){
              unsub();
              if(user) resolve(user);
              else firebase.auth().signInAnonymously()
                .then(function(cred){ resolve(cred.user); })
                .catch(reject);
            });
          });
        })
        .then(function(user){
          fbUser=user;
          return db.collection('scores').doc(fbUser.uid).get();
        })
        .then(function(doc){
          if(doc&&doc.exists){
            var d=doc.data();
            remoteBest=d.score|0;
            best=remoteBest;
            bestTime=d.time!=null?d.time|0:0;
            if(d.name){
              savePlayerName(d.name);
              nameField.value=playerName;
            }
            if(Array.isArray(d.badges)&&d.badges.length){
              applyBadgeIds(d.badges, false);
            }
            fbReady=true;
            /* push any session-only badges earned before profile loaded */
            var local=earnedBadgeList();
            var remote=d.badges||[];
            var needSync=false;
            for(var i=0;i<local.length;i++){
              if(remote.indexOf(local[i])<0){ needSync=true; break; }
            }
            if(needSync) persistBadges();
          } else {
            /* wiped / new profile — start empty (no local cache to restore) */
            best=0; bestTime=0; remoteBest=0;
            fbReady=true;
          }
          flushPendingSubmit();
          return loadLeaderboard();
        })
        .catch(function(err){
          console.warn('firebase', err);
          fbReady=!!(db&&fbUser); /* allow submits even if profile read failed */
          flushPendingSubmit();
          setBoardStatus('NO SCORES YET');
        });
    }catch(err){
      console.warn('firebase init', err);
      setBoardStatus('NO SCORES YET');
    }
  }

  function updateFromPointer(e){
    var r=stick.getBoundingClientRect();
    var dx=e.clientX-(r.left+r.width/2), dy=e.clientY-(r.top+r.height/2);
    var d=Math.hypot(dx,dy);
    if(d>MAX_TRAVEL){dx*=MAX_TRAVEL/d;dy*=MAX_TRAVEL/d;}
    setKnob(dx,dy);

  function hop(scale){

      return;
    }
    var jump=(gp.buttons[0]&&gp.buttons[0].pressed)||(gp.buttons[2]&&gp.buttons[2].pressed);
    var back=gp.buttons[1]&&gp.buttons[1].pressed;
    var ax=gp.axes[0]||0, ay=gp.axes[1]||0;
    var gm=Math.hypot(ax,ay);
    var up=!!(gp.buttons[12]&&gp.buttons[12].pressed)||ay<-0.55;
    var down=!!(gp.buttons[13]&&gp.buttons[13].pressed)||ay>0.55;
    var left=!!(gp.buttons[14]&&gp.buttons[14].pressed)||ax<-0.55;
    var right=!!(gp.buttons[15]&&gp.buttons[15].pressed)||ax>0.55;
    var padUsed=jump||back||gm>0.15||up||down||left||right;
    if(padUsed) setPadMode(true);

    var inMenu=state==='start'||state==='over'||
      (profileOv&&!profileOv.classList.contains('hidden'))||
      (badgeInfoEl&&!badgeInfoEl.classList.contains('hidden'));
    if(inMenu){
      if(up&&!padPrevNav.u) moveMenuFocus('u');
      if(down&&!padPrevNav.d) moveMenuFocus('d');
      if(left&&!padPrevNav.l) moveMenuFocus('l');
      if(right&&!padPrevNav.r) moveMenuFocus('r');
      padPrevNav={u:up,d:down,l:left,r:right};
      if(jump&&!padPrevConfirm) activateMenuFocus();
      if(back&&!padPrevBack){
        if(badgeInfoEl&&!badgeInfoEl.classList.contains('hidden')) closeBadgeInfo();
        else if(profileOv&&!profileOv.classList.contains('hidden')) closeProfile();
      }
      padPrevConfirm=jump;
      padPrevBack=back;
      padPrevJump=jump;
      return;
    }

    padPrevNav={u:up,d:down,l:left,r:right};
    padPrevConfirm=jump;
    padPrevBack=back;
    if(jump&&!padPrevJump){
      if(state==='play')requestHop();
    }
    padPrevJump=jump;
    if(state==='play'&&activeId===null){
      if(gm>0.15){
        var gsc=Math.min((gm-0.15)/0.85,1)/gm;
        input.x=ax*gsc; input.y=ay*gsc;
      }
    }
  }

  /* ========================= Threat spawning ========================= */
  function spawnAimed(){
    var a=Math.random()*Math.PI*2;
    var sx=Math.cos(a)*(ARENA-1), sz=Math.sin(a)*(ARENA-1);
    var lead=0.3;
    var tx=pos.x+vel.x*lead, tz=pos.z+vel.z*lead;
    var dx=tx-sx, dz=tz-sz, d=Math.hypot(dx,dz)||1;
    var sp=9+Math.min(elapsed*0.05,4);
    fireBullet(sx,sz,dx/d*sp,dz/d*sp);
  }
  function spawnRing(){
    var r=RAMPS[(Math.random()*RAMPS.length)|0]; /* burst from just past a ramp lip */
    var mx=r.x+Math.cos(r.a)*(r.len+1.4), mz=r.z+Math.sin(r.a)*(r.len+1.4);
    var n=8+Math.min(Math.floor(elapsed/12),8);
    var off=Math.random()*Math.PI*2, sp=6+Math.min(elapsed*0.04,3);
    for(var i=0;i<n;i++){
      var a=off+i/n*Math.PI*2;
      fireBullet(mx,mz,Math.cos(a)*sp,Math.sin(a)*sp);
    }
  }
  function startSweep(){
    if(sweep.active)return;
    sweep.active=true; sweep.warn=1.0; sweep.life=4.0;
    sweep.theta=Math.random()*Math.PI*2;
    sweep.omega=(Math.random()<0.5?1:-1)*(0.9+Math.min(elapsed*0.004,0.5));
    sweepMat.color.setHex(WARN); sweepMat.opacity=0.35;
    sweep.mesh.visible=true;
  }
  function startSpiral(){
    if(spiral)return;
    spiral={t:3,a:Math.random()*Math.PI*2,cool:0};
  }
  function scheduleThreat(){
    var roll=Math.random();
    if(elapsed>40&&roll<0.12){startSpiral();return;}
    if(elapsed>25&&roll<0.30){startSweep();return;}
    if(elapsed>15&&roll<0.55){spawnRing();return;}
    if(roll<0.5&&elapsed>6){fireChord();return;}
    spawnAimed();
  }

  /* Corridor threats: a relentless stream from up-corridor. Bullets live only
     in the flat channel (|x|<5.3) — wall riding above that line is the dodge,
     but the coin weave keeps dragging you back through the kill zone. */
  function corridorThreat(){
    var roll=Math.random();
    var sz=pos.z-45;
    var sp=12+Math.min(elapsed*0.04,4);
    if(roll<0.3){ /* led aimed pair */
      var ax=Math.max(-4.5,Math.min(4.5,pos.x+vel.x*0.35));
      var ddx=pos.x-ax, ddz=pos.z-sz, dd=Math.hypot(ddx,ddz)||1;
      fireBullet(ax,sz,ddx/dd*sp,ddz/dd*sp);
      fireBullet(ax,sz-2.5,ddx/dd*(sp+1),ddz/dd*(sp+1));
    } else if(roll<0.55){ /* 5-lane fan across the whole channel */
      for(var j=-2;j<=2;j++)fireBullet(j*2.3,sz,j*0.35,sp);
    } else if(roll<0.75){ /* double pinch: four converging from the edges */
      fireBullet(-4.8,sz,1.6,sp);   fireBullet(4.8,sz,-1.6,sp);
      fireBullet(-4.8,sz-4,1.2,sp); fireBullet(4.8,sz-4,-1.2,sp);
    } else if(roll<0.92){ /* burst: five quick jittered aimed shots */
      for(var k=0;k<5;k++){
        var bx=Math.max(-4.5,Math.min(4.5,pos.x+(Math.random()-0.5)*3.5));
        var bdx=pos.x-bx, bdz=pos.z-sz, bd=Math.hypot(bdx,bdz)||1;
        fireBullet(bx,sz,bdx/bd*(sp+k*0.5),bdz/bd*(sp+k*0.5));
      }
    } else { /* lane rain: three random straight lanes */
      for(var m=0;m<3;m++)fireBullet(-4.5+Math.random()*9,sz,0,sp+Math.random()*2);
    }
  }

  /* ============================ Hit logic ============================ */
  function isHubRest(){
    return level==='arena'&&!FIELD_OFF&&!major&&!bossExitActive;
  }
  function takeHit(fromX,fromZ){
    if(iframes>0)return;
    hearts--; iframes=1.3;
    everHit=true;
    combo=0; updateHUD();
    var dx=pos.x-fromX, dz=pos.z-fromZ, d=Math.hypot(dx,dz)||1;
    vel.x+=dx/d*10; vel.z+=dz/d*10;
    squashT=0.22; squashAmt=0.45;
    hitStop=Math.max(hitStop,0.08);         /* hit-stop */
    shakeT=0.25; shakeX=dx/d; shakeZ=dz/d;  /* directional camera kick */
    thudSfx();
    if(hearts<=0){
      if(isHubRest()) gameOver({hubDeath:true});
      else if(bossExitActive){
        /* Victory is locked in — leftover hits must not wipe the run */
        hearts=3; iframes=2;
        exitBossRoom();
      } else if(major&&major.dying>0){
        hearts=1; iframes=2; /* dissolve is already a win; keep the score */
      } else failToHub();
    }
  }

  /* Ground pound impact: shockwave clears bullets, damages boss */
  function poundImpact(){
    spawnShock(pos.x,pos.z);
    squashT=0.22; squashAmt=0.5;
    hitStop=Math.max(hitStop,0.06);
    fovPulse=0.2;
    boomSfx();
    var swept=0;
    for(var i=0;i<bullets.length;i++){
      var b=bullets[i];
      if(b.alive&&Math.hypot(pos.x-b.x,pos.z-b.z)<5){b.alive=false;b.mesh.visible=false;swept++;}
    }
    if(swept>=6)awardBadge('sweep');
    if(boss&&Math.hypot(pos.x-boss.x,pos.z-boss.z)<5.4)bossHitByPound();
    if(level==='obsidian'&&obs&&obs.phase==='grounded'
       &&Math.hypot(pos.x-obsX,pos.z-obsZ)<5.4){
      obs.hp--;
      obs.flash=0.3; obs.punch=0.4;
      burstSparks(obsX,obsY,obsZ,60,14);
      hitStop=Math.max(hitStop,0.1); fovPulse=0.3;
      shakeT=0.22; shakeX=pos.x||0.5; shakeZ=pos.z||0.5;
      spawnShock(0,0);
      var msC=0;
      for(var msi=0;msi<shards.length&&msC<4;msi++){
        var msh=shards[msi];
        if(!msh.alive){
          msC++;
          var msa=Math.random()*Math.PI*2;
          msh.alive=true; msh.t=0.9;
          msh.x=obsX; msh.y=obsY; msh.z=obsZ;
          msh.vx=Math.cos(msa)*7; msh.vz=Math.sin(msa)*7; msh.vy=6+Math.random()*4;
          msh.mesh.visible=true; msh.mesh.material.opacity=1;
          msh.mesh.scale.setScalar(0.6);
        }
      }
      if(obs.hp<=0){
        obsDead=true;
        shatterObsidian(obsX,obsY,obsZ);
        burstSparks(obsX,obsY,obsZ,150,18);
        blastSfx(2.0);
        obsMesh.visible=false; obsShadowM.visible=false;
        obsExitPortal.visible=true;
        spawnShock(obsX,obsZ);
        setTimeout(function(){ if(state==='play')spawnShock(obsX,obsZ); },220);
        coinScore+=2000; updateHUD();
        hearts=Math.min(3,hearts+1); updateHUD(); heartSfx();
        awardBadge('slayer');
        toastQueue.push('+2000'); showNextToast();
        toastQueue.push('FREE LIFE');
        toastQueue.push('PORTAL OPEN');
        boomSfx(); boomSfx();
        for(var oi=0;oi<12;oi++)(function(k){
          setTimeout(function(){
            if(state!=='play')return;
            flyCoin((Math.random()-0.5)*4,3,(Math.random()-0.5)*4);
            coinBlip();
          },k*80);
        })(oi);
      } else {
        obs.phase='rise';
        slamDustRing();
        toastQueue.push(obs.hp===2?'THE OBSIDIAN QUICKENS':'THE OBSIDIAN RAGES');
        showNextToast();
        boomSfx();
      }
    }
    if(major&&Math.hypot(pos.x-major.x,pos.z-major.z)<7)majorHitByPound();
  }

  function runMajorPhase(dt){

    if(major.phase===1){
      if(inkEvery(f,92,0)){

      }

    } else {

      }
      if(inkEvery(f,230,100)){

        boomSfx();
      }
      if(inkEvery(f,90,45)){
        inkSpawn(inkAim(), 16, {r:0.28,aimed:true,kind:'drop'});

    }
