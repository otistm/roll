  function ballLowEnough(){ return pos.y-RADIUS<BEAM_TOP; } /* mound-top + hop both clear */

  /* ============================= Physics ============================= */
  function physicsStep(dt){
    var poisonK=(level==='obsidian')?1-(inkFill/INK_CAP)*0.45:1;
    var accelE=ACCEL*(boostT>0?BOOST_MULT:1)*poisonK; /* boost & poison scale accel + clamp together */
    var maxE=MAX_SPEED*(boostT>0?BOOST_MULT:1)*poisonK; /* so clamp still == terminal */
    vel.x+=input.x*accelE*dt;
    vel.z+=input.y*accelE*dt;

    var wasGr=grounded;
    if(grounded){
      /* lava pads are flat discs — skip terrainGrad or edge samples (0 vs -5)
         invent huge slopes that fling the ball into the pit */
      if(level!=='lava'){
        var g=terrainGrad(pos.x,pos.z);
        vel.x+=-G*g.x*dt; vel.z+=-G*g.z*dt;         /* slope force */
      }
      if(level==='spiral'&&pos.y>RADIUS+0.4){     /* helix slope pulls down-path */
        var rr2=pos.x*pos.x+pos.z*pos.z||1;
        var gk=SP_H/SP_THMAX;
        vel.x+=-G*(-pos.z/rr2*gk)*dt;
        vel.z+=-G*( pos.x/rr2*gk)*dt;
      }
      var damp=Math.max(0,1-FRICTION*dt);
      vel.x*=damp; vel.z*=damp;
    }

    var s=Math.hypot(vel.x,vel.z);
    if(s>maxE){vel.x*=maxE/s;vel.z*=maxE/s;}

    vel.y-=G*dt;
    var ppx=pos.x, ppz=pos.z, ppBottom=pos.y-RADIUS;
    pos.x+=vel.x*dt; pos.y+=vel.y*dt; pos.z+=vel.z*dt;

    /* terrain (verified: only downward velocity reflects, hops survive) */
    var th=terrainH(pos.x,pos.z);
    /* lava pits: don't treat deep lava as a "wedge wall" when stepping off a pad */
    if(level!=='lava'&&th-(pos.y-RADIUS)>1.0){ /* walked into a wedge wall: undo + reflect */
      pos.x=ppx; pos.z=ppz;
      th=terrainH(pos.x,pos.z);
      var wgr=terrainGrad((ppx+pos.x)/2+vel.x*dt*0.5,(ppz+pos.z)/2+vel.z*dt*0.5);
      var wgm=Math.hypot(wgr.x,wgr.z)||1, wnx=wgr.x/wgm, wnz=wgr.z/wgm;
      var wvn=vel.x*wnx+vel.z*wnz;
      if(wvn>0){vel.x-=(1+REST)*wvn*wnx; vel.z-=(1+REST)*wvn*wnz;}
    }
    if(pos.y<th+RADIUS){
      pos.y=th+RADIUS;
      if(vel.y<0){
        if(pounding){
          pounding=false; vel.y=0;
          poundImpact();
        } else {
          var impact=-vel.y;
          vel.y=impact>2?impact*REST:0; /* upward bounce, or settle */
          if(wasAirborne&&impact>4){squashT=0.2;squashAmt=Math.min(impact*0.035,0.4);}
        }
      }
      /* any floor contact ends the air-slam window — bounce must still allow re-hop */
      poundReady=false; coyoteT=0.12;
      grounded=vel.y<=0.01;
      if(grounded){vel.y=0;lastGroundY=pos.y;}
      wasAirborne=false;
    } else {
      if(wasGr&&level!=='lava'){ /* lip launch: backward-sampled climb, never reads across the cliff */
        var vpm=Math.hypot(vel.x,vel.z);
        if(vpm>0.5){
          var bsx=ppx-vel.x/vpm*0.4, bsz=ppz-vel.z/vpm*0.4;
          var climb=(terrainH(ppx,ppz)-terrainH(bsx,bsz))/0.4*vpm;
          if(climb>1){
            vel.y=Math.min(climb*LAUNCH_MULT,LAUNCH_VY_CAP);
            poundReady=true;
            if(climb>6)fovPulse=Math.max(fovPulse,0.18);
            awardBadge('flight');
          }
        }
      }
      if(wasGr) coyoteT=0.12;
      else if(coyoteT>0) coyoteT=Math.max(0,coyoteT-dt);
      grounded=false; wasAirborne=true;
    }

    /* spiral: one-way helix support */
    if(level==='spiral'&&vel.y<=6){
      var sphs=spiralHeights(pos.x,pos.z), spNb=pos.y-RADIUS;
      for(var spi=0;spi<sphs.length;spi++){
        var sph=sphs[spi];
        if(grounded&&Math.abs(spNb-sph)<0.001)break;
        var spCross=ppBottom>=sph-0.06&&spNb<=sph&&vel.y<=0;
        var spBand=spNb<=sph&&sph-spNb<=1.2;
        var spFollow=wasGr&&Math.abs(spNb-sph)<=0.3&&vel.y<=0;
        if(spCross||spBand||spFollow){
          var spImpact=-vel.y;
          pos.y=sph+RADIUS;
          if(pounding){pounding=false;poundImpact();}
          else if(spImpact>4){squashT=0.2;squashAmt=Math.min(spImpact*0.035,0.4);}
          vel.y=0; grounded=true; lastGroundY=pos.y; wasAirborne=false;
          poundReady=false; coyoteT=0.12;
          break;
        }
      }
    }

    /* bounds: circular rim in the hub, wider in the boss room, walls in the corridor */
    if(level==='arena'){
      var boundR=FIELD_OFF?BOSS_ARENA:ARENA;
      var r=Math.hypot(pos.x,pos.z);
      if(r>boundR-RADIUS){
        var nx=pos.x/r,nz=pos.z/r;
        pos.x=nx*(boundR-RADIUS); pos.z=nz*(boundR-RADIUS);
        var vr=vel.x*nx+vel.z*nz;
        if(vr>0){vel.x-=(1+REST)*vr*nx; vel.z-=(1+REST)*vr*nz;}
      }
    } else if(level==='corridor'){
      if(pos.x> CORR_XMAX){pos.x= CORR_XMAX; if(vel.x>0)vel.x=-vel.x*REST;}
      if(pos.x<-CORR_XMAX){pos.x=-CORR_XMAX; if(vel.x<0)vel.x=-vel.x*REST;}
      if(pos.z> CORR_START){pos.z= CORR_START; if(vel.z>0)vel.z=-vel.z*REST;}
      if(pos.z< CORR_END-2){pos.z= CORR_END-2; if(vel.z<0)vel.z=-vel.z*REST;}
    } else if(level==='obsidian'){ /* circular boss room */
      var or2=Math.hypot(pos.x,pos.z);
      if(or2>OBS_R-RADIUS){
        var onx=pos.x/or2, onz=pos.z/or2;
        pos.x=onx*(OBS_R-RADIUS); pos.z=onz*(OBS_R-RADIUS);
        var ovr=vel.x*onx+vel.z*onz;
        if(ovr>0){vel.x-=(1+REST)*ovr*onx; vel.z-=(1+REST)*ovr*onz;}
      }
    } else if(level==='lava'){
      pos.x=Math.max(-15, Math.min(15, pos.x));
      if(pos.z>6){ pos.z=6; if(vel.z>0) vel.z*=-REST; }
      if(pos.z<lavaExitPad.z-10){ pos.z=lavaExitPad.z-10; if(vel.z<0) vel.z*=-REST; }
    } else { /* nautilus: square floor bounds */
      if(pos.x> SP_BOUND){pos.x= SP_BOUND; if(vel.x>0)vel.x=-vel.x*REST;}
      if(pos.x<-SP_BOUND){pos.x=-SP_BOUND; if(vel.x<0)vel.x=-vel.x*REST;}
      if(pos.z> SP_BOUND){pos.z= SP_BOUND; if(vel.z>0)vel.z=-vel.z*REST;}
      if(pos.z<-SP_BOUND){pos.z=-SP_BOUND; if(vel.z<0)vel.z=-vel.z*REST;}
    }

    /* pillar bumpers (hub only, gone during the major boss) */
    if(!FIELD_OFF&&level==='arena')for(var i=0;i<PILLARS.length;i++){
      var pl=PILLARS[i];
      var dx=pos.x-pl.x, dz=pos.z-pl.z, dd=Math.hypot(dx,dz);
      var minD=pl.r+RADIUS;
      if(dd<minD&&dd>0){
        var px=dx/dd, pz=dz/dd;
        pos.x=pl.x+px*minD; pos.z=pl.z+pz*minD;
        var vn=vel.x*px+vel.z*pz;
        if(vn<0){vel.x-=(1+REST)*vn*px; vel.z-=(1+REST)*vn*pz;}
      }
    }

    /* rolling rotation */
    var planar=Math.hypot(vel.x,vel.z);
    if(planar>0.001){
      rollAxis.set(vel.z,0,-vel.x).normalize();
      rollQuat.setFromAxisAngle(rollAxis,(planar*dt)/RADIUS);
      ballMesh.quaternion.premultiply(rollQuat);
    }
  }

  /* ============================== Update ============================= */
  function update(dt){
    elapsed+=dt;
    if(elapsed>=60&&!everHit)awardBadge('clean60');
    if(iframes>0)iframes-=dt;

    if(!major){
    /* INK STORM: 10s frenzy — triple spawn rate, double coins */
    if(storm>0){
      storm-=dt;
      if(storm<=0)stormEl.classList.remove('on');
    } else if(level==='corridor'){
      stormTimer-=dt;
      if(stormTimer<=0){ storm=10; stormTimer=50; stormCoins=0; stormEl.classList.add('on'); }
    }

    /* threat scheduler: hub rest only (never during Inkwell / exit portal) */
    if(level==='corridor'){
      spawnTimer-=dt;
      if(spawnTimer<=0){
        corridorThreat();
        spawnTimer=Math.max(storm>0?0.18:0.22,(0.7-elapsed*0.005)/(storm>0?1.6:1));
      }
    } else if(isHubRest()){
      spawnTimer-=dt;
      if(spawnTimer<=0){
        scheduleThreat();
        spawnTimer=Math.max(1.4,3.4-elapsed*0.02);
      }
    }
    }
    if(isHubRest()){
      pipTimer-=dt;
      if(pipTimer<=0){spawnPip();pipTimer=4;}
    }

    var steps=2, sub=dt/steps;
    for(var i=0;i<steps;i++)physicsStep(sub);

    /* bullets */
    for(i=0;i<bullets.length;i++){
      var b=bullets[i];
      if(!b.alive)continue;
      /* seed split (Inkwell phase 3) */
      if(b.kind==='seed'&&b.splitAt&&b.age+dt>=b.splitAt&&b.age<b.splitAt){
        var sa=Math.atan2(b.vz,b.vx), ssp=Math.hypot(b.vx,b.vz)||1;
        fireBullet(b.x,b.z,Math.cos(sa-0.5)*ssp*0.85,Math.sin(sa-0.5)*ssp*0.85,{r:0.32,kind:'drop'});
        fireBullet(b.x,b.z,Math.cos(sa+0.5)*ssp*0.85,Math.sin(sa+0.5)*ssp*0.85,{r:0.32,kind:'drop'});
        b.alive=false; b.mesh.visible=false; continue;
      }
      if(b.seek){ /* boss projectiles home toward the player */
        var bsp=Math.hypot(b.vx,b.vz)||1;
        var hx=pos.x-b.x, hz=pos.z-b.z, hd=Math.hypot(hx,hz)||1;
        var turn=Math.min(1, 7.2*dt);
        b.vx+=(hx/hd*bsp-b.vx)*turn;
        b.vz+=(hz/hd*bsp-b.vz)*turn;
        var ns=Math.hypot(b.vx,b.vz)||1;
        b.vx*=bsp/ns; b.vz*=bsp/ns;
      }
      if(b.turn){
        var ta=Math.atan2(b.vz,b.vx)+b.turn*dt, ts=Math.hypot(b.vx,b.vz)||1;
        b.vx=Math.cos(ta)*ts; b.vz=Math.sin(ta)*ts;
      }
      if(b.kind==='seed'&&b.splitAt){
        var sk=Math.max(0.1, 1-b.age/b.splitAt);
        b.x+=b.vx*dt*sk; b.z+=b.vz*dt*sk;
      } else {
        b.x+=b.vx*dt; b.z+=b.vz*dt;
      }
      b.age+=dt;
      if(b.seedRim&&b.seedRim.visible) b.seedRim.rotation.z+=dt*3;
      /* range cull is level-aware: the arena radius test was silently killing
         every corridor bullet at spawn (they spawn 45 units up-corridor) */
      var oob = level==='arena'
        ? Math.hypot(b.x,b.z)>(FIELD_OFF?BOSS_ARENA:ARENA)+1.5
        : level==='lava'
        ? (Math.abs(b.x)>16||b.z>10||b.z<lavaExitPad.z-14)
        : (b.z<CORR_END-6||b.z>CORR_START+2||Math.abs(b.x)>CORR_XMAX+2);
      var maxAge=b.maxAge!=null?b.maxAge:9;
      if(b.age>maxAge||oob){b.alive=false;b.mesh.visible=false;continue;}
      /* pillars block bullets: real cover */
      var hitR=b.br!=null?b.br:BULLET_R;
      if(!FIELD_OFF&&level==='arena')for(var pj=0;pj<PILLARS.length;pj++){
        var pl2=PILLARS[pj];
        if(Math.hypot(b.x-pl2.x,b.z-pl2.z)<pl2.r+hitR){b.alive=false;b.mesh.visible=false;break;}
      }
      if(!b.alive)continue;
      var by;
      if(level==='lava'){
        by=Math.max(hitR, pos.y); /* track player height across elevated pads */
      } else if(level==='arena'){
        if(!FIELD_OFF&&terrainH(b.x,b.z)>0.6){b.alive=false;b.mesh.visible=false;continue;} /* absorbed by ramps */
        by=hitR;
      } else {
        by=hitR; /* corridor bullets fly flat in the channel */
        if(terrainH(b.x,b.z)>0.9||b.z>CORR_START+2){ /* the walls absorb them */
          b.alive=false;b.mesh.visible=false;continue;
        }
      }
      b.mesh.position.set(b.x,by,b.z);
      if(iframes<=0&&Math.hypot(pos.x-b.x,pos.z-b.z)<RADIUS+hitR
         &&Math.abs(pos.y-by)<RADIUS+hitR){
        b.alive=false; b.mesh.visible=false;
        takeHit(b.x,b.z);
      }
    }

    /* spiral emitter */
    if(spiral){
      spiral.t-=dt; spiral.cool-=dt; spiral.a+=dt*4.2;
      if(spiral.cool<=0){
        spiral.cool=0.11;
        fireBullet(0,0,Math.cos(spiral.a)*7,Math.sin(spiral.a)*7);
      }
      if(spiral.t<=0)spiral=null;
    }

    /* sweep beam */
    if(sweep.active){
      sweep.theta+=sweep.omega*dt;
      sweep.mesh.rotation.y=-sweep.theta;
      if(sweep.warn>0){
        sweep.warn-=dt;
        if(sweep.warn<=0){sweepMat.color.setHex(INK);sweepMat.opacity=1;}
      } else {
        sweep.life-=dt;
        if(sweep.life<=0){sweep.active=false;sweep.mesh.visible=false;}
        else if(iframes<=0&&ballLowEnough()){
          var d0=Math.abs(pos.x*Math.sin(sweep.theta)-pos.z*Math.cos(sweep.theta));
          if(d0<0.35+RADIUS){
            var n2x=Math.sin(sweep.theta),n2z=-Math.cos(sweep.theta);
            var side=(pos.x*n2x+pos.z*n2z)>=0?1:-1;
            takeHit(pos.x-n2x*side*2,pos.z-n2z*side*2);
          }
        }
      }
    }

    /* chord beams */
    for(i=0;i<chords.length;i++){
      var c=chords[i];
      if(!c.alive)continue;
      if(c.warn>0){
        c.warn-=dt;
        if(c.warn<=0){c.mesh.material.color.setHex(INK);c.mesh.material.opacity=1;}
      } else {
        c.life-=dt;
        if(c.life<=0){c.alive=false;c.mesh.visible=false;continue;}
        if(iframes<=0&&ballLowEnough()){
          var dd2=Math.abs((pos.x-c.px)*c.uz-(pos.z-c.pz)*c.ux);
          if(dd2<0.35+RADIUS){
            var n3x=c.uz,n3z=-c.ux;
            var side2=((pos.x-c.px)*n3x+(pos.z-c.pz)*n3z)>=0?1:-1;
            takeHit(pos.x-n3x*side2*2,pos.z-n3z*side2*2);
          }
        }
      }
    }

    /* boost: decrement timer, tint the ball's outline while active */
    if(boostT>0){
      boostT-=dt;
      if(boostT<=0&&raygunT<=0)outline.material.color.setHex(INK);
    }
    if(isHubRest()){
      boostSpawnTimer-=dt;
      if(boostSpawnTimer<=0){spawnBoost();boostSpawnTimer=11;}
    }
    if(!major&&level==='corridor'&&raygunUnlocked){
      raygunSpawnTimer-=dt;
      if(raygunSpawnTimer<=0){spawnRaygun();raygunSpawnTimer=11;}
    }

    /* boost pads: spin + bob + pickup */
    for(i=0;i<boostPads.length;i++){
      var bp=boostPads[i];
      if(!bp.alive)continue;
      bp.mesh.rotation.y+=3.2*dt; bp.mesh.rotation.x=Math.PI/2;
      var bbob=Math.sin(elapsed*2.6+bp.phase)*0.1;
      bp.mesh.position.y=terrainH(bp.x,bp.z)+0.85+bbob;
      bp.shadow.scale.setScalar(1-bbob*0.9);
      if(Math.hypot(pos.x-bp.x,pos.z-bp.z)<RADIUS+0.6&&pos.y-RADIUS<terrainH(bp.x,bp.z)+1.1){
        bp.alive=false; bp.mesh.visible=false; bp.shadow.visible=false;
        boostT=BOOST_TIME;
        boostsGrabbed++;
        if(boostsGrabbed>=3)awardBadge('speed3');
        if(raygunT<=0)outline.material.color.setHex(BLUE);
        var sp0=Math.hypot(vel.x,vel.z);
        if(sp0>0.5){vel.x*=1.25;vel.z*=1.25;}
        else {vel.x+=input.x*6;vel.z+=input.y*6;}
        boostSfx();
        fovPulse=0.22; shakeT=0.12; shakeX=vel.x; shakeZ=vel.z;
      }
    }

    /* raygun pads: spin + bob + pickup (unlocked after giant) */
    for(i=0;i<rayGunPads.length;i++){
      var rp=rayGunPads[i];
      if(!rp.alive)continue;
      rp.mesh.rotation.y+=2.8*dt;
      var rbob=Math.sin(elapsed*2.8+rp.phase)*0.1;
      rp.mesh.position.y=terrainH(rp.x,rp.z)+0.9+rbob;
      rp.shadow.scale.setScalar(1-rbob*0.9);
      if(Math.hypot(pos.x-rp.x,pos.z-rp.z)<RADIUS+0.7&&pos.y-RADIUS<terrainH(rp.x,rp.z)+1.2){
        rp.alive=false; rp.mesh.visible=false; rp.shadow.visible=false;
        raygunT=RAYGUN_TIME;
        rayFireCool=0;
        outline.material.color.setHex(RAY);
        raySfx(); boomSfx();
        fovPulse=0.2; shakeT=0.1;
        toastQueue.push('RAYGUN'); showNextToast();
      }
    }

    /* active raygun: auto-aim nearest projectile and blast it */
    if(raygunT>0){
      raygunT-=dt;
      if(raygunT<=0){
        outline.material.color.setHex(boostT>0?BLUE:INK);
      } else {
        rayFireCool-=dt;
        if(rayFireCool<=0){
          var bestB=null, bestD=22;
          for(var rj=0;rj<bullets.length;rj++){
            var rb=bullets[rj];
            if(!rb.alive)continue;
            var rd=Math.hypot(pos.x-rb.x,pos.z-rb.z);
            if(rd<bestD){bestD=rd; bestB=rb;}
          }
          if(bestB){
            var byAim=level==='arena'?BULLET_R:BULLET_R;
            if(fireRayBolt(bestB.x, byAim, bestB.z)){
              rayFireCool=0.14; /* ~7 shots/sec, matches reference feel */
              raySfx();
            }
          }
        }
      }
    }
    /* ray bolts: fly + erase bullets on contact */
    for(i=0;i<rayBolts.length;i++){
      var bolt=rayBolts[i];
      if(!bolt.alive)continue;
      bolt.x+=bolt.vx*dt; bolt.y+=bolt.vy*dt; bolt.z+=bolt.vz*dt;
      bolt.life-=dt;
      bolt.mesh.position.set(bolt.x,bolt.y,bolt.z);
      var hit=false;
      for(var bj=0;bj<bullets.length;bj++){
        var bb=bullets[bj];
        if(!bb.alive)continue;
        var bby=level==='arena'?BULLET_R:BULLET_R;
        if(Math.hypot(bolt.x-bb.x,bolt.z-bb.z)<0.7&&Math.abs(bolt.y-bby)<0.9){
          bb.alive=false; bb.mesh.visible=false;
          hit=true; break;
        }
      }
      if(hit||bolt.life<=0||Math.hypot(bolt.x-pos.x,bolt.z-pos.z)>40){
        bolt.alive=false; bolt.mesh.visible=false;
      }
    }

    /* coins: spin + bob, collect -> fly to counter */
    for(i=0;i<pips.length;i++){
      var p=pips[i];
      if(!p.alive)continue;
      p.mesh.rotation.y+=4*dt;
      var bob=Math.sin(elapsed*3+p.phase)*0.08;
      p.mesh.position.y=terrainH(p.x,p.z)+0.75+bob;
      p.shadow.scale.setScalar(1-bob*0.9); /* breathes with the bob */
      if(Math.hypot(pos.x-p.x,pos.z-p.z)<RADIUS+0.6&&pos.y-RADIUS<terrainH(p.x,p.z)+0.9){
        collected++; combo++;
        coinScore+=5*Math.min(combo,12)*(storm>0?2:1);
        if(storm>0){stormCoins++; if(stormCoins>=5)awardBadge('stormer');}
        coinBlip(); updateHUD();
        p.alive=false; p.mesh.visible=false; p.shadow.visible=false;
        flyCoin(p.x,p.mesh.position.y,p.z);
      }
    }

    /* major boss: THE INKWELL — three-phase danmaku */
    if(major){
      major.t-=dt;
      if(bossBannerT>0){
        bossBannerT-=dt;
        bossBannerEl.style.opacity=String(Math.min(1, bossBannerT/0.35));
        if(bossBannerT<=0) bossBannerEl.style.opacity='0';
      }
      if(major.t<=0 && major.dying===0){ timeoutMajor(); }
      else {
      if(major.invuln>0) major.invuln-=dt;
      major.mouth=Math.max(0, major.mouth-dt*3);

      /* death dissolve */
      if(major.dying>0){
        major.dying+=dt;
        if(Math.floor(major.dying*10)%2===0 && Math.floor((major.dying-dt)*10)%2!==0){
          spawnShock(major.x+(Math.random()-0.5)*major.r, major.z+(Math.random()-0.5)*major.r);
          shakeT=Math.max(shakeT,0.12);
        }
        major.r=MAJOR_R*Math.max(0, 1-major.dying/2.3);
        if(major.dying>=2.3){ defeatMajor(); }
        } else {
          /* sway like SUMI ink sun */
          var sway=major.phase===3?12:7;
          major.tx=Math.sin(major.phaseT*0.48+major.phase)*sway;
          major.tz=(major.phase===3?-1.5:-4)+Math.sin(major.phaseT*0.78)*1.4;
          major.x+=(major.tx-major.x)*Math.min(1,1.2*dt);
          major.z+=(major.tz-major.z)*Math.min(1,1.2*dt);
          runMajorPhase(dt);
          majorAutoFire(dt);
        }
        stepInkShots(dt);

        if(major){
      /* lasers */
      for(var mli=0;mli<majorLaserPool.length;mli++){
        var L=majorLaserPool[mli];
        if(!L.alive){ L.g.visible=false; continue; }
        L.g.visible=true;
        L.g.position.set(L.x,0,L.z);
        L.g.rotation.y=-L.angle;
        if(L.warnT>0){
          L.warnT-=dt;
          L.warn.visible=true; L.beam.visible=false;
          L.warn.material.opacity=0.35+0.3*Math.sin(elapsed*20);
          if(L.warnT<=0){ L.warn.visible=false; L.beam.visible=true; }
        } else {
          L.angle+=L.spin*dt;
          L.g.rotation.y=-L.angle;
          L.life-=dt;
          L.warn.visible=false; L.beam.visible=true;
          if(L.life<=0){ L.alive=false; L.g.visible=false; continue; }
          if(iframes<=0&&ballLowEnough()){
            var ldx=pos.x-L.x, ldz=pos.z-L.z;
            var proj=ldx*Math.cos(L.angle)+ldz*Math.sin(L.angle);
            if(proj>0){
              var perp=Math.abs(-ldx*Math.sin(L.angle)+ldz*Math.cos(L.angle));
              if(perp<L.w*0.5+RADIUS) takeHit(L.x,L.z);
            }
          }
        }
      }

      /* wobbling ink body + face */
      if(major.flash>0) major.flash-=dt;
      var bossVis=major.r>0.15;
      majorGroup.visible=bossVis; majorShadow.visible=bossVis;
      if(bossVis){
        var posAttr=majorBodyGeo.attributes.position, base=majorBodyBase, t=elapsed;
        for(var vi=0;vi<posAttr.count;vi++){
          var bx=base[vi*3], by=base[vi*3+1], bz=base[vi*3+2];
          var aa=Math.atan2(bz,bx), ee=Math.asin(Math.max(-1,Math.min(1,by)));
          var kk=1+0.055*Math.sin(aa*3+t*2)+0.04*Math.sin(ee*5-t*1.4)+0.025*Math.sin(aa*7+ee*3+t*3);
          posAttr.setXYZ(vi, bx*kk, by*kk, bz*kk);
        }
        posAttr.needsUpdate=true;
        majorBodyGeo.computeVertexNormals();
        var flick=major.invuln>0 && ((elapsed*12)|0)%2===0;
        majorBody.material.color.setHex(flick||major.flash>0?0x555555:INK);
        var hoverY=major.r+0.35+Math.sin(elapsed*1.1)*0.35;
        majorGroup.position.set(major.x, hoverY, major.z);
        majorGroup.scale.setScalar(major.r);
        /* face toward player roughly (+z local → rotate group yaw) */
        majorGroup.rotation.y=Math.atan2(pos.x-major.x, pos.z-major.z);
        var eyeH=[1,0.7,0.45][major.phase-1];
        majorEyeL.scale.set(0.16,0.07*eyeH,0.10);
        majorEyeR.scale.set(0.16,0.07*eyeH,0.10);
        majorEyeL.material=majorEyeR.material=(major.phase===3?majorEyeMatSeal:majorEyeMatPaper);
        var m=Math.min(1,major.mouth), mr=0.30*m+0.02;
        majorMouth.scale.set(mr, mr*0.75, 0.2);
        majorMouthRim.scale.setScalar(mr*1.15);
        var faceOn=major.dying===0;
        majorMouth.visible=majorMouthRim.visible=faceOn;
        majorEyeL.visible=majorEyeR.visible=faceOn;
        majorShadow.position.set(major.x+SDX*1.2,0.03,major.z+SDZ*1.2);
        majorShadow.scale.setScalar(major.r*0.9);
      }
      updateBossHud();
      if(major.dying===0&&iframes<=0&&Math.hypot(pos.x-major.x,pos.z-major.z)<RADIUS+major.r*0.85)
        takeHit(major.x,major.z);
        }
      }
    } else if(bossHudEl.classList.contains('on')){
      bossHudEl.classList.remove('on');
    }

    /* boss */
    if(boss){
      boss.retarget-=dt;
      if(boss.retarget<=0){
        var ba=Math.random()*Math.PI*2;
        var bpr=level==='corridor'?6:9;
        boss.tx=boss.ax+Math.cos(ba)*bpr; boss.tz=boss.az+Math.sin(ba)*bpr; boss.retarget=6;
      }
      var mdx=boss.tx-boss.x, mdz=boss.tz-boss.z, md=Math.hypot(mdx,mdz);
      if(md>0.2){boss.x+=mdx/md*2.2*dt; boss.z+=mdz/md*2.2*dt;}
      boss.cool-=dt;
      if(boss.cool<=0&&boss.tele<=0)boss.tele=0.45;
      if(boss.tele>0){
        boss.tele-=dt;
        if(boss.tele<=0){
          boss.alt=!boss.alt;
          if(boss.alt){ /* seeking ring volley */
            var bn=12, boff=Math.random()*Math.PI*2;
            for(var bk=0;bk<bn;bk++){
              var baa=boff+bk/bn*Math.PI*2;
              fireBullet(boss.x,boss.z,Math.cos(baa)*6.5,Math.sin(baa)*6.5,true);
            }
          } else { /* seeking 3-spread */
            var bdx=pos.x-boss.x, bdz=pos.z-boss.z;
            var bbase=Math.atan2(bdz,bdx);
            for(var bk2=-1;bk2<=1;bk2++){
              var baa2=bbase+bk2*0.25;
              fireBullet(boss.x,boss.z,Math.cos(baa2)*10,Math.sin(baa2)*10,true);
            }
          }
          boss.cool=storm>0?1.3:2.4;
        }
      }
      if(boss.flash>0)boss.flash-=dt;
      bossMesh.material.color.setHex(boss.flash>0?0x999999:INK);
      var tp=(boss.tele>0?1.08+Math.sin(boss.tele*30)*0.05:1)*(0.72+0.28*(boss.hp/3));
      bossMesh.scale.setScalar(tp);
      bossMesh.position.set(boss.x,terrainH(boss.x,boss.z)+2.2*tp,boss.z);
      bossShadow.scale.setScalar(tp);
      bossShadow.position.set(boss.x+SDX*0.7,terrainH(boss.x,boss.z)+0.03,boss.z+SDZ*0.7);
      if(iframes<=0&&Math.hypot(pos.x-boss.x,pos.z-boss.z)<RADIUS+2.0)takeHit(boss.x,boss.z);
    } else if(!major&&level==='corridor'){
      bossTimer-=dt;
      if(bossTimer<=0)spawnBoss();
    }

    /* heart drop: rare lifeline at 1 HP, far away, on a timer */
    if(heartCool>0)heartCool-=dt;
    if(heartDrop){
      heartDrop.t-=dt;
      heartMesh.rotation.y+=2.5*dt;
      heartMesh.position.y=terrainH(heartDrop.x,heartDrop.z)+1+Math.sin(elapsed*3)*0.08;
      heartMesh.visible=heartDrop.t>2||((heartDrop.t*8)|0)%2===0; /* blink before despawn */
      heartShadow.visible=heartMesh.visible;
      if(heartDrop){
        heartShadow.position.set(heartDrop.x+SDX*0.5,terrainH(heartDrop.x,heartDrop.z)+0.02,heartDrop.z+SDZ*0.5);
      }
      if(heartDrop.t<=0){heartDrop=null;heartMesh.visible=false;heartShadow.visible=false;}
      else if(hearts<3&&Math.hypot(pos.x-heartDrop.x,pos.z-heartDrop.z)<RADIUS+0.9){
        hearts++; updateHUD(); heartSfx();
        awardBadge('heart');
        heartDrop=null; heartMesh.visible=false; heartShadow.visible=false;
      }
    } else if(!major&&level!=='spiral'&&level!=='lava'&&hearts===1&&heartCool<=0&&Math.random()<dt*0.2){
      var hha, hhr;
      if(level==='corridor'){
        hha=Math.random()*Math.PI*2;
        hhr=4+Math.random()*5;
        heartDrop={x:Math.cos(hha)*hhr,z:pos.z-18-Math.random()*20,t:8};
      } else {
        hha=Math.atan2(pos.z,pos.x)+Math.PI+(Math.random()-0.5);
        hhr=Math.min(14+Math.random()*8,ARENA-3);
        heartDrop={x:Math.cos(hha)*hhr,z:Math.sin(hha)*hhr,t:8};
      }
      heartMesh.position.set(heartDrop.x,terrainH(heartDrop.x,heartDrop.z)+1,heartDrop.z);
      heartMesh.visible=true; heartCool=30;
    }

    /* shockwaves */
    for(i=0;i<shocks.length;i++){
      var sh2=shocks[i];
      if(!sh2.mesh.visible)continue;
      sh2.t-=dt;
      if(sh2.t<=0){sh2.mesh.visible=false;continue;}
      var shk=1-(sh2.t/0.35);
      sh2.mesh.scale.setScalar(0.5+shk*4.5);
      sh2.mesh.material.opacity=sh2.t/0.35;
    }

    /* --------------- portals + corridor entities --------------- */
    if(level==='arena'){
      if(isHubRest()){
        hubTimer+=dt;
        updateHubPortalHud();
        if(!portalUnlocked&&hubTimer>=HUB_PORTAL_WAIT){
          portalUnlocked=true;
          hideHubPortalHud();
          setHubPortalColor(hubSeq);
          spawnShock(hubPortal.position.x,hubPortal.position.z);
          toastQueue.push('PORTAL OPEN'); showNextToast();
          boomSfx(); fovPulse=0.25;
        }
      } else {
        hideHubPortalHud();
      }
      /* hub portal only while the rest area is intact (not in boss room) */
      hubPortal.visible=portalUnlocked&&isHubRest();
      hubPortalShadow.visible=portalUnlocked&&isHubRest();
      if(portalUnlocked&&isHubRest()){
        setHubPortalColor(hubSeq);
        hubPortal.rotation.y+=1.4*dt;
        hubPortal.scale.setScalar(1.25*(1+Math.sin(elapsed*2.5)*0.06));
      }
      if(portalUnlocked&&isHubRest()
         &&Math.hypot(pos.x-hubPortal.position.x,pos.z-hubPortal.position.z)<2.2
         &&Math.abs(pos.y-hubPortal.position.y)<1.7){
        enterHubDestination();
      }
      /* after the giant falls, its portal leads back to the hub */
      if(bossExitActive){
        bossExitPortal.rotation.y+=1.4*dt;
        bossExitPortal.scale.setScalar(1+Math.sin(elapsed*2.5)*0.06);
        if(state==='play'
           &&Math.hypot(pos.x-bossExitPortal.position.x,pos.z-bossExitPortal.position.z)<2
           &&Math.abs(pos.y-bossExitPortal.position.y)<1.8){
          exitBossRoom();
        }
      }
    } else if(level==='obsidian'){
      /* ---- THE OBSIDIAN fight ---- */
      if(!obsDead&&obs){
        var obsSpin=(obs.tele>0?6:((obs.beamT>0||obs.beamWarnT>0)?2.7:1.6));
        obsMesh.rotation.y+=obsSpin*dt;
        obsMesh.rotation.x+=0.5*dt;
        /* hit feedback: shader glow spike + flash sprite + scale punch */
        if(obs.flash>0)obs.flash-=dt;
        var fk=Math.max(0,Math.min(1,obs.flash*4));
        obs.punch*=Math.max(0,1-dt*6);
        obsMesh.scale.setScalar(1+obs.punch);
        /* glow: telegraphs, beam warn, and hits all light it up */
        var glowTarget=Math.max(fk,
          obs.tele>0?0.7:0,
          obs.beamWarnT>0?0.9:0,
          obs.beamT>0?1:0,
          obs.phase==='grounded'?0.35:0);
        obs.glow=(obs.glow||0)+(glowTarget-(obs.glow||0))*Math.min(1,dt*8);
        obsUniforms.uGlow.value=obs.glow;
        obsUniforms.uTime.value=elapsed;
        obsUniforms.uCamPos.value.copy(camera.position);
        obsHalo.position.set(obsX,obsY,obsZ);
        obsHalo.material.opacity=0.2+obs.glow*0.5;
        obsHalo.scale.setScalar(11+obs.glow*5+Math.sin(elapsed*2)*0.4);
        obsFlash.position.set(obsX,obsY,obsZ);
        obsFlash.material.opacity=fk;
        obsFlash.scale.setScalar(4+fk*16);
        obsLight.position.set(obsX,obsY,obsZ);
        obsLight.intensity=1.2+obs.glow*7+fk*8;
        var stage=4-obs.hp; /* 1 calm, 2 quickened, 3 raging */
        if(obs.phase==='float'){
          obsY+=(OBS_FLOAT-obsY)*Math.min(1,dt*4);
          /* movement: calm holds center; quickened orbits; raging STALKS */
          var tgx=0, tgz=0;
          if(stage===2){
            obs.orbitA+=0.45*dt;
            tgx=Math.cos(obs.orbitA)*6; tgz=Math.sin(obs.orbitA)*6;
          } else if(stage===3){
            var pr=Math.hypot(pos.x,pos.z), pc=Math.min(1,13/Math.max(pr,0.01));
            tgx=pos.x*pc*0.85; tgz=pos.z*pc*0.85;
          }
          obsX+=(tgx-obsX)*Math.min(1,dt*(stage===3?1.6:0.8));
          obsZ+=(tgz-obsZ)*Math.min(1,dt*(stage===3?1.6:0.8));
          /* raging drip: passive dust rains while it floats */
          if(stage===3){
            obs.dripT-=dt;
            if(obs.dripT<=0){
              obs.dripT=0.55;
              for(var dpi=0,dpc=0;dpi<dust.length&&dpc<2;dpi++){
                var dp=dust[dpi];
                if(!dp.alive){
                  dpc++;
                  dp.alive=true; dp.age=1.5;
                  dp.x=obsX+(Math.random()-0.5)*3; dp.y=obsY-1.5; dp.z=obsZ+(Math.random()-0.5)*3;
                  dp.vx=(Math.random()-0.5)*2; dp.vz=(Math.random()-0.5)*2; dp.vy=-(6+Math.random()*3);
                  dp.mesh.visible=true;
                }
              }
            }
          }
          /* beam attack: warn, then 2s of rotation-locked beam */
          if(obs.beamWarnT>0){
            obs.beamWarnT-=dt;
            /* the warn arm marks where the beam will ignite. Meanwhile the
               gem ABSORBS: streams of motes converge into it from all around,
               PRISM-style, selling the charge before the release. */
            for(var abI=0;abI<3;abI++){
              var abA=Math.random()*Math.PI*2, abR=7+Math.random()*5;
              var abX=obsX+Math.cos(abA)*abR, abZ=obsZ+Math.sin(abA)*abR;
              var abY=obsY+(Math.random()-0.5)*6;
              spawnSpark(abX,abY,abZ,(obsX-abX)*3,(obsY-abY)*3,(obsZ-abZ)*3,0.36);
            }
            obsBeamWarn.visible=true;
            obsBeamWarn.rotation.y=-obs.beamA;
            obsBeamWarn.position.set(obsX,0,obsZ);
            if(obs.beamWarnT<=0){
              obs.beamT=(4-obs.hp)===3?2.6:2.35;
              obsBeamWarn.visible=false;
              blastSfx((4-obs.hp)===3?1.6:1.2);
              burstSparks(obsX,obsY,obsZ,40,10);
              shakeT=0.2; shakeX=0.6; shakeZ=0.4; fovPulse=0.25;
            }
          } else if(obs.beamT>0){
            obs.beamT-=dt;
            /* one full 360-degree sweep in a random direction from a random
               start — hop it when it comes around, or duck under the shaft */
            obs.beamA+=(obs.beamDir||1)*2.7*dt;
            var bdur=(stage===3)?2.6:2.35;
            obsBeam.visible=true;
            obsBeam.rotation.order='YXZ';
            /* tubes are built along local +Z (PRISM convention); the warn arm,
               rake, and collision use the +X basis. yaw = PI/2 - beamA maps
               the +Z shaft onto the same world angle as everything else. */
            obsBeam.rotation.y=Math.PI/2-obs.beamA;
            obsBeam.rotation.x=OBS_PITCH;
            obsBeam.position.set(obsX,obsY,obsZ);
            obsRake.visible=true;
            obsRake.rotation.y=-obs.beamA;
            obsRake.position.set(obsX,0,obsZ);
            obsBeam2.visible=(stage===3);
            obsBeam2.rotation.order='YXZ';
            obsBeam2.rotation.y=Math.PI/2-obs.beamA+Math.PI;
            obsBeam2.rotation.x=OBS_PITCH;
            obsBeam2.position.set(obsX,obsY,obsZ);
            obsRake2.visible=(stage===3);
            obsRake2.rotation.y=-obs.beamA+Math.PI;
            obsRake2.position.set(obsX,0,obsZ);
            /* shader lifecycle */
            beamUniforms.uTime.value=elapsed;
            beamUniforms.uLife.value=1-obs.beamT/bdur;
            beamUniforms.uPower.value=stage===3?1.5:1.15;
            var envB=Math.min(1,(bdur-obs.beamT)*8)*Math.min(1,obs.beamT*3);
            for(var fi=0;fi<finMats.length;fi++){
              finMats[fi].opacity=0.45*envB*(0.6+0.4*Math.sin(elapsed*20+fi*2.1));
            }
            obsBeam.userData.impact.material.opacity=0.9*envB;
            obsBeam.userData.impact.scale.setScalar(3+4*envB);
            if(Math.random()<0.6){
              var ba2=obs.beamA, brr=OBS_RAKE*(0.3+Math.random()*0.7);
              spawnSpark(obsX+Math.cos(ba2)*brr, obsY-(obsY-0.9)*(brr/OBS_RAKE),
                obsZ+Math.sin(ba2)*brr,
                Math.cos(ba2)*10,(Math.random()-0.5)*3,Math.sin(ba2)*10,0.5);
            }
            /* ray hit: near the beam line, in its half-plane, low enough to clip */
            /* damage only once the beam is visibly lit (shader fade-in done) */
            if(iframes<=0&&pos.y<2.3&&(bdur-obs.beamT)>0.12){
              var ba=Math.atan2(pos.z-obsZ,pos.x-obsX)-obs.beamA;
              var br=Math.hypot(pos.x-obsX,pos.z-obsZ);
              var beamHit=Math.abs(Math.sin(ba))*br<1.35&&br<OBS_R;
              /* raging: a second arm sweeps opposite — both half-planes clip */
              var inArm=stage===3?beamHit:(beamHit&&Math.cos(ba)>0);
              if(br>OBS_RAKE-0.8&&inArm){
                takeHit(obsX,obsZ);
              }
            }
            if(obs.beamT<=0){obsBeam.visible=false;obsBeam2.visible=false;
              obsRake.visible=false;obsRake2.visible=false;obs.cool=1.6;}
          } else {
            obs.cool-=dt;
            if(obs.cool<=0&&obs.tele<=0)obs.tele=0.6; /* spin-up telegraph */
            if(obs.tele>0){
              obs.tele-=dt;
              if(obs.tele<=0){
                /* attack pattern: spray, beam, spray, then lower */
                if(obs.attackIdx===1){
                  obs.beamWarnT=0.85; /* long enough for the absorption to read */
                  chargeSfx();
                  obs.beamA=Math.random()*Math.PI*2;          /* random start... */
                  obs.beamDir=Math.random()<0.5?-1:1;         /* ...random direction */
                } else {
                  sprayDust(); thudSfx();
                  if(stage>=2)setTimeout(function(){ if(state==='play'&&level==='obsidian'&&!obsDead)sprayDust(); },260);
                }
                obs.attackIdx++;
                if(obs.attackIdx>=3){
                  obs.phase='lower';
                  obs.slamsLeft=(stage===3?1:0); /* rage: it strikes twice */
                  obsBeam.visible=false;obsBeam2.visible=false;
                  obsRake.visible=false;obsRake2.visible=false;obsBeamWarn.visible=false;
                }
                else if(obs.attackIdx!==1)obs.cool=[0,2.2,1.6,1.2][stage];
                else obs.cool=0.01;
              }
            }
          }
        } else if(obs.phase==='lower'){
          obs.fallV=(obs.fallV||3)+34*dt; /* it SLAMS down under its own weight */
          obsY-=obs.fallV*dt;
          if(obsY<=OBS_GROUND){
            obsY=OBS_GROUND; obs.fallV=0;
            obs.phase='grounded';
            obs.vulT=[0,3.5,3.0,2.5][stage];
            obs.ringT=0.35; /* punish rings start pulsing */
            spawnShock(obsX,obsZ);
            slamDustRing();
            burstSparks(obsX,1.5,obsZ,50,12);
            blastSfx(1.1);
            shakeT=0.3; shakeX=0.7; shakeZ=0.3;
            fovPulse=0.35;
            boomSfx(); thudSfx();
            if(iframes<=0&&grounded&&Math.hypot(pos.x-obsX,pos.z-obsZ)<5.5){
              takeHit(obsX,obsZ); /* standing under the slam */
            }
          }
        } else if(obs.phase==='grounded'){
          obs.vulT-=dt;
          obsMesh.rotation.y+=3*dt; /* agitated */
          obs.ringT-=dt;
          if(obs.ringT<=0){ firePunishRing(); obs.ringT=1.15; thudSfx(); }
          if(obs.vulT<=0){
            if(obs.slamsLeft>0){obs.slamsLeft--;obs.phase='restrike';}
            else obs.phase='rise';
          }
        } else if(obs.phase==='restrike'){ /* rage: it rises fast and slams AGAIN — on you */
          obsY+=16*dt;
          obsX+=(pos.x-obsX)*Math.min(1,dt*3.2);
          obsZ+=(pos.z-obsZ)*Math.min(1,dt*3.2);
          if(obsY>=10.5){obs.phase='lower';obs.fallV=6;}
        } else if(obs.phase==='rise'){
          obsY+=5.5*dt;
          if(obsY>=OBS_FLOAT){
            obsY=OBS_FLOAT;obs.phase='float';obs.attackIdx=0;
            obs.cool=[0,2.4,1.8,1.4][stage];
          }
        }
        obsMesh.position.set(obsX,obsY,obsZ);
        obsShadowM.position.set(obsX+SDX*obsY*0.4,0.03,obsZ+SDZ*obsY*0.4);
        obsShadowM.scale.setScalar(Math.max(0.9,2.1-obsY*0.08));
      }
      /* poison tint: the ball darkens as ink accumulates */
      var pk=inkFill/INK_CAP;
      ballMat.color.setRGB(
        (0xe8/255)*(1-pk*0.72),
        (0x26/255)*(1-pk*0.72),
        (0x2a/255)*(1-pk*0.72));
      /* dust */
      for(i=0;i<dust.length;i++){
        var du=dust[i];
        if(!du.alive)continue;
        du.age+=dt;
        du.x+=du.vx*dt; du.y+=du.vy*dt; du.z+=du.vz*dt;
        if(du.y<=0.35&&du.vy<0){ /* it lands — and stains */
          du.alive=false;du.mesh.visible=false;
          if(Math.random()<0.4)spawnStain(du.x,du.z);
          continue;
        }
        du.mesh.position.set(du.x,du.y,du.z);
        if(du.age>4.5||Math.hypot(du.x,du.z)>OBS_R+1.5){du.alive=false;du.mesh.visible=false;continue;}
        if(iframes<=0
           &&Math.hypot(pos.x-du.x,pos.z-du.z)<RADIUS+0.3
           &&Math.abs(pos.y-du.y)<RADIUS+0.35){
          du.alive=false; du.mesh.visible=false;
          inkFill++; lastInkT=elapsed;
          tone(210,0.05,'square',0.05);
          inkFillEl.style.width=Math.min(100,inkFill/INK_CAP*100)+'%';
          if(inkFill>=INK_CAP){
            inkFill=0;
            inkFillEl.style.width='0%';
            takeHit(obsX,obsZ);
          }
        }
      }
      pPoints.visible=true;
      updateSparks(dt);
      /* punish rings expand; hop them */
      for(i=0;i<punishRings.length;i++){
        var pring=punishRings[i];
        if(!pring.alive)continue;
        pring.r+=7.5*dt;
        pring.mesh.scale.setScalar(pring.r);
        pring.mesh.material.opacity=Math.max(0,0.85-(pring.r/10)*0.7);
        if(pring.r>10){pring.alive=false;pring.mesh.visible=false;continue;}
        if(iframes<=0&&pos.y<2.2){
          var prd=Math.hypot(pos.x-pring.x,pos.z-pring.z);
          if(Math.abs(prd-pring.r)<0.65)takeHit(pring.x,pring.z);
        }
      }
      /* stains: standing in poison feeds the meter */
      stainTickT-=dt;
      for(i=0;i<stains.length;i++){
        var stn=stains[i];
        if(!stn.alive)continue;
        stn.t-=dt;
        if(stn.t<2)stn.mesh.material.opacity=Math.max(0,stn.t/2)*0.8;
        if(stn.t<=0){stn.alive=false;stn.mesh.visible=false;continue;}
        if(grounded&&stainTickT<=0&&iframes<=0
           &&Math.hypot(pos.x-stn.x,pos.z-stn.z)<1.05*stn.mesh.scale.x+RADIUS*0.5){
          stainTickT=0.5;
          inkFill++; lastInkT=elapsed;
          tone(180,0.05,'square',0.05);
          inkFillEl.style.width=Math.min(100,inkFill/INK_CAP*100)+'%';
          if(inkFill>=INK_CAP){inkFill=0;inkFillEl.style.width='0%';takeHit(stn.x,stn.z);}
        }
      }
      /* clean play recovers: after 2.5s untouched the ink drains slowly */
      if(inkFill>0&&elapsed-lastInkT>2.5){
        inkDecayT-=dt;
        if(inkDecayT<=0){
          inkDecayT=1.6;
          inkFill=Math.max(0,inkFill-1);
          inkFillEl.style.width=Math.min(100,inkFill/INK_CAP*100)+'%';
        }
      } else inkDecayT=0.8;
      /* shards */
      for(i=0;i<shards.length;i++){
        var shd=shards[i];
        if(!shd.alive)continue;
        shd.t-=dt;
        shd.vy-=G*dt*0.6;
        shd.x+=shd.vx*dt; shd.y+=shd.vy*dt; shd.z+=shd.vz*dt;
        if(shd.y<0.3){shd.y=0.3;shd.vy=Math.abs(shd.vy)*0.3;}
        shd.mesh.position.set(shd.x,shd.y,shd.z);
        shd.mesh.rotation.x+=4*dt; shd.mesh.rotation.y+=5*dt;
        shd.mesh.material.opacity=Math.max(0,shd.t/1.5);
        shd.mesh.scale.setScalar(Math.max(0.1,shd.t/1.5));
        if(shd.t<=0){shd.alive=false;shd.mesh.visible=false;}
      }
      /* exit portal after the kill */
      if(obsDead){
        obsExitPortal.rotation.y+=1.4*dt;
        obsExitPortal.scale.setScalar(1+Math.sin(elapsed*2.5)*0.06);
        if(Math.hypot(pos.x-obsExitPortal.position.x,pos.z-obsExitPortal.position.z)<2){
          advanceHubSeq();
          returnToHub();
        }
      }
    } else if(level==='lava'){
      lavaT+=dt;
      lavaUni.uTime.value=reducedMotion?lavaT*0.08:lavaT;
      lavaUni.uFogNear.value=lavaFog.near;
      lavaUni.uFogFar.value=lavaFog.far;
      lavaPlane.position.x=pos.x; lavaPlane.position.z=pos.z;

      /* cycling platforms — flicker before they drop; y includes pad elevation */
      for(var lpi=0;lpi<lavaPlats.length;lpi++){
        var pm=lavaPlats[lpi], p=pm.data;
        if(p.x>500) continue;
        var st=lavaPlatState(p,lavaT);
        var base=(p.h||0)-LAVA.platH/2;
        var y=base, vis=true, emis=p.permanent?0.18:0.02;
        if(!p.permanent){
          if(st.state==='warn'){
            /* speed up blink as disappear approaches */
            var rate=7+st.k*16;
            vis=Math.sin(lavaT*rate*Math.PI*2)>0;
            emis=0.05;
          } else if(st.state==='gone'){
            var riseStart=lavaPlatRiseStart();
            if(st.k>riseStart){
              var rk=(st.k-riseStart)/(1-riseStart);
              y=base-(1-rk)*1.5; emis=0.3*rk; vis=true;
            } else { vis=false; y=base-3; }
          } else if(st.state==='active'&&st.k<0.1){
            emis=0.35*(1-st.k/0.1);
          }
        }
        pm.mat.color.setHex(0xffffff);
        pm.rim.material.color.setHex(INK);
        pm.mesh.visible=vis;
        pm.mesh.position.y=y;
        if(pm.mat.emissive) pm.mat.emissive.setRGB(emis*0.4,emis*0.15,emis*0.12);
        /* deep floor shadow sells elevation; hide with the pad */
        if(pm.shadow){
          var ph=p.h||0;
          var hk=Math.min(1, ph/4.2);
          pm.shadow.visible=vis;
          pm.shadow.position.set(p.x+SDX*ph*0.22, 0.04, p.z+SDZ*ph*0.22);
          pm.shadow.scale.setScalar(p.r*(1.05+hk*0.75));
          pm.shadowMat.opacity=vis?(0.18+hk*0.58):0;
        }
      }

      /* side-edge ink volleys (sparse) */
      lavaShotT-=dt;
      if(lavaShotT<=0){
        lavaSideVolley();
        lavaShotT=2.4+lavaRnd()*1.6;
      }

      /* blowout geyser */
      var B=lavaBlow;
      B.t-=dt;
      if(B.state==='idle'&&B.t<=0){
        B.state='tele'; B.t=LAVA.blowTele; pickLavaBlowSpot();
        lavaGeyser.visible=true; lavaGeyser.position.set(B.x,0,B.z);
        geyserCol.scale.set(1,0.001,1); geyserCore.scale.set(1,0.001,1); geyserInk.scale.set(1,0.001,1);
      } else if(B.state==='tele'){
        var tk=1-B.t/LAVA.blowTele;
        lavaUni.uBlow.value.set(B.x,B.z,LAVA.blowR*1.5,tk);
        lavaTeleRing.material.opacity=0.35+0.5*Math.abs(Math.sin(lavaT*12));
        lavaTeleRing.scale.setScalar(LAVA.blowR*(0.55+0.5*tk));
        if(B.t<=0){
          B.state='erupt'; B.t=LAVA.blowErupt;
          boomSfx(); shakeT=Math.max(shakeT,0.3);
        }
      } else if(B.state==='erupt'){
        var ek=1-B.t/LAVA.blowErupt;
        var h=ek<0.3?(ek/0.3):(1-Math.max(0,(ek-0.65)/0.35));
        var H=6.2*Math.max(0.001,h);
        geyserCol.scale.set(1+0.12*Math.sin(lavaT*28),H,1+0.12*Math.cos(lavaT*24));
        geyserCore.scale.set(1,H*1.05,1);
        geyserInk.scale.set(geyserCol.scale.x,H,geyserCol.scale.z);
        lavaTeleRing.material.opacity=0.55*(1-ek);
        lavaUni.uBlow.value.set(B.x,B.z,LAVA.blowR*1.5,1-ek);
        if(iframes<=0&&h>0.3){
          if(Math.hypot(pos.x-B.x,pos.z-B.z)<LAVA.blowR&&pos.y<H+0.5){
            takeHit(B.x,B.z); /* stay on course — only pit falls reset to start */
          }
        }
        if(B.t<=0){
          lavaGeyser.visible=false;
          lavaUni.uBlow.value.w=0;
          scheduleLavaBlow();
        }
      }

      /* hop land juice */
      var lavaTh=lavaTerrainH(pos.x,pos.z);
      if(pos.y>(lavaTh>-4?lavaTh:0)+RADIUS+1.15) lavaAirHigh=true;
      if(lavaAirHigh&&grounded){
        lavaAirHigh=false;
        spawnShock(pos.x,pos.z);
      }

      /* fall into lava — only when not supported by a pad */
      if(lavaTh>-4){
        if(pos.y<lavaTh+RADIUS-0.35){
          pos.y=lavaTh+RADIUS; vel.y=Math.max(0,vel.y); grounded=true; lastGroundY=pos.y;
        }
      } else if(pos.y<RADIUS-0.15){
        lavaPitFall();
      }

      /* route coins — same gold discs + ink outline as hub / climb / nautilus */
      for(var lci=0;lci<lavaCoins.length;lci++){
        var lc=lavaCoins[lci];
        if(!lc.alive)continue;
        lc.mesh.rotation.y+=4*dt;
        lc.mesh.position.y=(lc.h||0)+0.75+Math.sin(elapsed*3+lci)*0.08;
        if(Math.hypot(pos.x-lc.x,pos.z-lc.z)<RADIUS+0.7&&Math.abs(pos.y-lc.mesh.position.y)<1.6){
          lc.alive=false; lc.mesh.visible=false;
          collected++; combo++;
          coinScore+=5*Math.min(combo,12);
          coinBlip(); updateHUD();
          flyCoin(lc.x,lc.mesh.position.y,lc.z);
        }
      }

      /* branch diamond — same 50-coin fountain as the climb */
      for(var ldi=0;ldi<lavaDiamonds.length;ldi++){
        var ld=lavaDiamonds[ldi];
        if(!ld.alive)continue;
        ld.mesh.rotation.y+=2.2*dt;
        ld.mesh.rotation.x+=1.1*dt;
        ld.mesh.position.y=(ld.h||0)+1.15+Math.sin(elapsed*2.5+ldi)*0.08;
        if(Math.hypot(pos.x-ld.x,pos.z-ld.z)<RADIUS+0.9&&Math.abs(pos.y-ld.mesh.position.y)<1.8){
          ld.alive=false; ld.mesh.visible=false;
          coinScore+=250;
          var ldx0=ld.x, ldz0=ld.z, ldy0=ld.mesh.position.y;
          for(var ldf=0;ldf<10;ldf++)(function(k){
            setTimeout(function(){
              if(state!=='play')return;
              combo++;
              flyCoin(ldx0+(Math.random()-0.5)*2,ldy0,ldz0+(Math.random()-0.5)*2,5);
              coinBlip(); updateHUD();
            },k*70);
          })(ldf);
          fovPulse=0.25; badgeSfx();
        }
      }

      /* exit portal */
      lavaExitPortal.rotation.y+=1.4*dt;
      lavaExitPortal.scale.setScalar(1+Math.sin(elapsed*2.5)*0.06);
      if(!lavaDone&&Math.hypot(pos.x-lavaExitPortal.position.x,pos.z-lavaExitPortal.position.z)<2
         &&Math.abs(pos.y-lavaExitPortal.position.y)<2.5){
        finishLava();
      }
    } else if(level==='spiral'){
      spiralExitPortal.rotation.y+=1.4*dt;
      spiralExitPortal.scale.setScalar(1+Math.sin(elapsed*2.5)*0.06);
      if(Math.hypot(pos.x-spiralExitPortal.position.x,pos.z-spiralExitPortal.position.z)<2
         &&Math.abs(pos.y-spiralExitPortal.position.y)<2.5){
        advanceHubSeq();
        returnToHub();
      }
      var spLeft=0;
      for(i=0;i<spiralCoins.length;i++){
        var sc=spiralCoins[i];
        if(!sc.alive)continue;
        spLeft++;
        sc.mesh.rotation.y+=4*dt;
        sc.mesh.position.y=sc.h+0.75+Math.sin(elapsed*3+i)*0.08;
        if(Math.hypot(pos.x-sc.x,pos.z-sc.z)<RADIUS+0.7&&Math.abs(pos.y-sc.mesh.position.y)<1.6){
          sc.alive=false; sc.mesh.visible=false; spLeft--;
          collected++; combo++;
          coinScore+=5*Math.min(combo,12);
          coinBlip(); updateHUD();
          flyCoin(sc.x,sc.mesh.position.y,sc.z);
        }
      }
      if(spLeft===0&&!spiralBonusGiven){
        spiralBonusGiven=true;
        coinScore+=1000;
        toastQueue.push('ALL COINS +1000'); showNextToast();
        badgeSfx(); fovPulse=0.3; updateHUD();
      }
      dropTimer-=dt;
      if(dropTimer<=0){ spawnInkDrop(); dropTimer=Math.max(0.55,1.4-elapsed*0.006); }
      for(i=0;i<inkDrops.length;i++){
        var dr=inkDrops[i];
        if(!dr.alive)continue;
        dr.y-=16*dt;
        dr.mesh.position.y=dr.y;
        dr.tele.scale.setScalar(0.2+Math.max(0,1-(dr.y-dr.th)/30)*1.1);
        if(iframes<=0&&Math.hypot(pos.x-dr.x,pos.z-dr.z)<RADIUS+0.5
           &&Math.abs(pos.y-dr.y)<RADIUS+0.6){
          dr.alive=false; dr.mesh.visible=false; dr.tele.visible=false;
          takeHit(dr.x,dr.z);
          continue;
        }
        if(dr.y<=dr.th+0.5){
          dr.alive=false; dr.mesh.visible=false; dr.tele.visible=false;
          spawnBlotch(dr.x,dr.z,dr.th);
          thudSfx();
        }
      }
      for(i=0;i<blotches.length;i++){
        var bl=blotches[i];
        if(!bl.alive)continue;
        bl.t-=dt;
        if(bl.mesh.scale.x<1)bl.mesh.scale.setScalar(Math.min(1,bl.mesh.scale.x+dt*5));
        if(bl.t<1.5)bl.mesh.material.opacity=Math.max(0,bl.t/1.5)*0.95;
        if(bl.t<=0){bl.alive=false;bl.mesh.visible=false;continue;}
        if(iframes<=0&&grounded
           &&Math.hypot(pos.x-bl.x,pos.z-bl.z)<1.4*bl.mesh.scale.x+RADIUS*0.4
           &&Math.abs((pos.y-RADIUS)-bl.h)<0.8){
          takeHit(bl.x,bl.z);
        }
      }
    } else if(level==='corridor'){
      /* exit portal at the top of the climb → hub (next seq: Obsidian) */
      exitPortal.visible=corrPortalActive;
      if(corrPortalActive){
        exitPortal.rotation.y+=1.4*dt;
        exitPortal.scale.setScalar(1+Math.sin(elapsed*2.5)*0.06);
        if(Math.hypot(pos.x-exitPortal.position.x,pos.z-exitPortal.position.z)<2){
          exitCorridor();
        }
      }
      /* sequence coins: collect in order; a wrong pick resets them all */
      if(coinBlinkT>0){
        coinBlinkT-=dt;
        var blinkOn=((coinBlinkT*8)|0)%2===0;
        for(i=0;i<corrCoins.length;i++)corrCoins[i].mesh.visible=blinkOn;
        if(coinBlinkT<=0){ /* reappear, sequence restarts */
          for(i=0;i<corrCoins.length;i++){
            corrCoins[i].alive=true;
            corrCoins[i].mesh.visible=true;
            corrCoins[i].mesh.material.color.setHex(GOLD);
            corrCoins[i].mesh.scale.setScalar(1);
          }
          coinIndex=0;
        }
      } else {
        for(i=0;i<corrCoins.length;i++){
          var cc=corrCoins[i];
          if(!cc.alive)continue;
          cc.mesh.rotation.y+=4*dt;
          cc.mesh.position.y=terrainH(cc.x,cc.z)+0.75+Math.sin(elapsed*3+i)*0.08;
          /* the next required coin pulses */
          cc.mesh.scale.setScalar(i===coinIndex?1.25+Math.sin(elapsed*6)*0.15:1);
          if(Math.hypot(pos.x-cc.x,pos.z-cc.z)<RADIUS+0.7&&Math.abs(pos.y-cc.mesh.position.y)<1.6){
            if(i!==coinIndex){ failCoinSequence(); break; }
            cc.alive=false; cc.mesh.visible=false;
            coinIndex++;
            collected++; combo++;
            coinScore+=5*Math.min(combo,12)*(storm>0?2:1);
            if(storm>0){stormCoins++; if(stormCoins>=5)awardBadge('stormer');}
            coinBlip(); updateHUD();
            flyCoin(cc.x,cc.mesh.position.y,cc.z);
            if(coinIndex>=corrCoins.length){
              toastQueue.push('COIN RUN CLEAR'); showNextToast();
              boomSfx(); fovPulse=0.2;
            }
          }
        }
      }
      /* diamonds: 50 coins, delivered as a fountain of heavy flyers */
      for(i=0;i<diamonds.length;i++){
        var dd=diamonds[i];
        if(!dd.alive)continue;
        dd.mesh.rotation.y+=2.2*dt;
        dd.mesh.rotation.x+=1.1*dt;
        if(Math.hypot(pos.x-dd.x,pos.z-dd.z)<RADIUS+0.9&&Math.abs(pos.y-dd.mesh.position.y)<1.8){
          dd.alive=false; dd.mesh.visible=false;
          coinScore+=250;
          var dx0=dd.x, dz0=dd.z, dy0=dd.mesh.position.y;
          for(var df=0;df<10;df++)(function(k){
            setTimeout(function(){
              if(state!=='play')return;
              combo++;
              flyCoin(dx0+(Math.random()-0.5)*2,dy0,dz0+(Math.random()-0.5)*2,5);
              coinBlip(); updateHUD();
            },k*70);
          })(df);
          fovPulse=0.25; badgeSfx();
        }
      }
      /* sliders: ink cubes sweeping the pipe */
      for(i=0;i<sliders.length;i++){
        var sl=sliders[i];
        var sx=Math.sin(elapsed*sl.speed+sl.phase)*sl.amp;
        sl.mesh.position.set(sx,terrainH(sx,sl.z)+0.85,sl.z);
        sl.mesh.rotation.y+=1.5*dt;
        if(iframes<=0&&Math.hypot(pos.x-sx,pos.z-sl.z)<RADIUS+1.0
           &&Math.abs(pos.y-sl.mesh.position.y)<RADIUS+0.9){
          takeHit(sx,sl.z);
        }
      }
      /* gates: rotating bars over the pipe center (hop them) */
      for(i=0;i<gates.length;i++){
        var gt=gates[i];
        gt.theta+=gt.omega*dt;
        gt.mesh.rotation.y=-gt.theta;
        gt.mesh.position.y=0.9;
        if(iframes<=0&&pos.y-RADIUS<1.3){
          var gdx=pos.x-0, gdz=pos.z-gt.z;
          var perp=Math.abs(gdx*Math.sin(gt.theta)-gdz*Math.cos(gt.theta));
          var along=Math.abs(gdx*Math.cos(gt.theta)+gdz*Math.sin(gt.theta));
          if(perp<0.35+RADIUS&&along<6){
            takeHit(pos.x-Math.sin(gt.theta),gt.z+Math.cos(gt.theta));
          }
        }
      }
    }

    /* squash & stretch */
    var sx=1,sy=1;
    if(squashT>0){
      squashT-=dt;
      var k=squashAmt*(squashT/0.2);
      sy=1-k; sx=1+k*0.6;
    }
    var sp2=Math.hypot(vel.x,vel.z);
    var stretch=1+Math.min(sp2/MAX_SPEED,1)*0.12;
    /* airborne scale: ball grows toward the camera; ramp launches reach ~11 high */
    var airH=level==='spiral'
      ? Math.max(0,pos.y-lastGroundY)
      : Math.max(0,pos.y-RADIUS-terrainH(pos.x,pos.z));
    if(airH>=9.5&&level!=='spiral')awardBadge('skyhigh');
    var airScale=1+Math.min(airH/10,1)*0.9;
    headG.rotation.y=sp2>0.5?Math.atan2(vel.x,vel.z):headG.rotation.y;
    headG.scale.set(sx*airScale,sy*airScale,sx*stretch*airScale);

    /* speed lines */
    if(!reducedMotion){
      lineTimer-=dt;
      if((sp2>MAX_SPEED*0.65||boostT>0)&&sp2>1&&lineTimer<=0){
        lineTimer=boostT>0?0.03:0.06;              /* denser trail while boosting */
        var L=lines[lineIdx=(lineIdx+1)%lines.length];
        var bx=pos.x-vel.x/sp2*1.6+(Math.random()-0.5)*1.4;
        var bz=pos.z-vel.z/sp2*1.6+(Math.random()-0.5)*1.4;
        L.mesh.material.color.setHex(boostT>0?BLUE:INK);
        L.mesh.position.set(bx,terrainH(bx,bz)+0.06,bz);
        L.mesh.rotation.z=-Math.atan2(vel.x,vel.z);
        L.t=0.35; L.mesh.visible=true;
      }
      for(i=0;i<lines.length;i++){
        var L2=lines[i];
        if(!L2.mesh.visible)continue;
        L2.t-=dt;
        L2.mesh.material.opacity=Math.max(0,L2.t/0.35)*0.5;
        if(L2.t<=0)L2.mesh.visible=false;
      }
    }

    /* i-frame blink */
    headG.visible=iframes<=0||((iframes*12)|0)%2===0;

    updateHUD();
  }

  /* =============================== Loop =============================== */
  var last=performance.now();
  function frame(now){
    requestAnimationFrame(frame);
    var dt=Math.min((now-last)/1000,1/30);
    last=now;

    if(state==='play'){
      keyboardInput();
      gamepadInput();
      if(hitStop>0)hitStop-=dt;   /* hit-stop: freeze the sim, keep rendering */
      else update(dt);
    } else {
      gamepadInput();             /* A / Cross starts or retries */
    }

    moveG.position.copy(pos);
    spot.position.set(pos.x,pos.y+19,pos.z);
    spotTarget.position.set(pos.x,0,pos.z);

    var h=level==='spiral'
      ? Math.max(0,pos.y-lastGroundY)
      : pos.y-RADIUS-terrainH(pos.x,pos.z);
    var soff=0.3+h*0.5; /* drop shadow drifts with altitude */
    shadow.position.x=pos.x+SDX*soff; shadow.position.z=pos.z+SDZ*soff;
    shadow.position.y=(level==='spiral'?Math.max(0,lastGroundY-RADIUS):terrainH(shadow.position.x,shadow.position.z))+0.02;
    shadow.scale.setScalar(Math.max(0.5,1-h*0.09));
    shadow.material.opacity=Math.max(0.35,1-h*0.12);

    if(level==='spiral') camTarget.set(pos.x,pos.y*0.7,pos.z);
    else camTarget.set(pos.x,0,pos.z);
    camera.position.lerp(camTarget.clone().add(CAM_OFFSET),0.08);
    if(!reducedMotion){
      if(shakeT>0){ /* directional kick, decaying wobble */
        shakeT-=dt;
        var sk=Math.max(shakeT,0)/0.25*0.55;
        camera.position.x+=shakeX*sk*Math.sin(shakeT*70);
        camera.position.z+=shakeZ*sk*Math.sin(shakeT*70);
      }
      if(fovPulse>0){
        fovPulse-=dt;
        camera.fov=42-Math.max(fovPulse,0)/0.25*3;
        camera.updateProjectionMatrix();
      } else if(camera.fov!==42){
        camera.fov=42; camera.updateProjectionMatrix();
      }
    }
    camera.lookAt(camTarget.x,0,camTarget.z);

    /* ink meter hovers above the ball in the boss room */
    if(level==='obsidian'&&state==='play'){
      inkMeterEl.style.display='block';
      projV.set(pos.x,pos.y+2.6,pos.z).project(camera);
      inkMeterEl.style.left=((projV.x*0.5+0.5)*window.innerWidth)+'px';
      inkMeterEl.style.top=((-projV.y*0.5+0.5)*window.innerHeight)+'px';
    } else {
      inkMeterEl.style.display='none';
    }

    renderer.render(scene,camera);
  }
  requestAnimationFrame(frame);
  updateHUD();

  window.addEventListener('resize',function(){
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });
})();
</script>
</body>
